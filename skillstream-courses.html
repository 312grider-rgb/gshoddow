<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Courses — Paradise of Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#141F38;
    --ink-2:#1F2E52;
    --gold:#C9A24E;
    --gold-light:#E4C583;
    --cream:#FBF7EF;
    --sage:#6B8F71;
    --charcoal:#2B2B2B;
    --line:#E9E2D2;
    --danger:#B5533C;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--charcoal);
    padding-bottom:80px;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  button, a, .btn, .course-card, .chip{ transition:transform 0.18s cubic-bezier(.22,1,.36,1), box-shadow 0.18s cubic-bezier(.22,1,.36,1); }
  button:active, a.btn:active, .btn:active, .course-card:active{ transform:scale(0.97); }
  header.top{
    background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%);
    color:var(--cream);
    padding:20px 18px 26px;
  }
  header.top .eyebrow{
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:4px;
  }
  header.top h1{
    margin:0;
    font-size:26px;
    font-weight:700;
  }
  header.top p{
    margin:6px 0 0;
    font-size:14px;
    opacity:0.85;
  }
  .wrap{padding:18px;}
  .btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--ink);
    color:#fff;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-size:15px;
    font-weight:600;
    font-family:'Inter',sans-serif;
    cursor:pointer;
  }
  .btn.gold{background:var(--gold); color:var(--ink);}
  .btn.outline{background:transparent; color:var(--ink); border:1.5px solid var(--ink);}
  .btn.danger{background:var(--danger); color:#fff;}
  .btn.small{padding:8px 12px; font-size:13px; border-radius:8px;}
  .btn-full{width:100%; justify-content:center;}
  .fab{
    position:fixed;
    bottom:22px;
    right:18px;
    z-index:20;
    box-shadow:0 6px 18px rgba(27,42,74,0.3);
  }
  .course-card{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px;
    margin-bottom:14px;
  }
  .course-card .row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .course-card h3{margin:0 0 4px; font-size:19px;}
  .course-card .meta{font-size:13px; color:#666; margin-bottom:10px;}
  .badge{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .badge.live{background:#E7F0E8; color:var(--sage);}
  .badge.draft{background:#F3EEE3; color:#8a7748;}
  .card-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
    flex-wrap:wrap;
  }
  .empty{
    text-align:center;
    padding:50px 20px;
    color:#777;
  }
  .empty .display{font-size:20px; color:var(--ink); margin-bottom:6px;}
  /* Modal */
  .overlay{
    position:fixed; inset:0;
    background:rgba(27,42,74,0.45);
    display:none;
    align-items:flex-end;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:#fff;
    width:100%;
    max-height:92vh;
    overflow-y:auto;
    border-radius:20px 20px 0 0;
    padding:22px 18px 30px;
  }
  .sheet h2{margin:0 0 16px; font-size:22px;}
  label{
    display:block;
    font-size:13px;
    font-weight:600;
    margin:14px 0 6px;
    color:var(--ink);
  }
  input, textarea, select{
    width:100%;
    padding:11px 12px;
    border:1.5px solid var(--line);
    border-radius:9px;
    font-size:15px;
    font-family:'Inter',sans-serif;
    background:#fdfcfa;
  }
  textarea{min-height:70px; resize:vertical;}
  .sheet-actions{
    display:flex;
    gap:10px;
    margin-top:22px;
  }
  .lesson-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .lesson-row:last-child{border-bottom:none;}
  .lesson-row .l-title{font-weight:600; font-size:14.5px;}
  .lesson-row .l-meta{font-size:12px; color:#777;}
  .lesson-actions{display:flex; gap:6px;}
  .icon-btn{
    background:none; border:none; font-size:16px; cursor:pointer; padding:4px;
  }
  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:30px;
    font-size:14px; z-index:100; display:none;
  }
  .close-x{position:absolute; top:16px; right:16px; background:none; border:none; font-size:22px; color:#999;}
  .sheet{position:relative;}
  .loading{text-align:center; padding:40px; color:#888;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">Paradise of Eternal Learners</div>
  <h1>My Courses</h1>
  <p>Learn. Grow. Live Better. — build your self-paced curriculum.</p>
</header>

<div class="wrap">
  <div id="courseList"><div class="loading">Loading your courses…</div></div>
</div>

<button class="btn gold fab" onclick="openCourseModal()">+ New Course</button>

<!-- Course Create/Edit Modal -->
<div class="overlay" id="courseOverlay">
  <div class="sheet">
    <button class="close-x" onclick="closeModal('courseOverlay')">&times;</button>
    <h2 id="courseModalTitle" class="display">New Course</h2>
    <input type="hidden" id="courseId">
    <label>Title</label>
    <input type="text" id="courseTitle" placeholder="e.g. Intro to Digital Photography">
    <label>Description</label>
    <textarea id="courseDesc" placeholder="What will students learn?"></textarea>
    <label>Category</label>
    <input type="text" id="courseCategory" placeholder="e.g. Photography, Business, Language">
    <label>Academic Level (optional)</label>
    <select id="courseLevel">
      <option value="">Not academic / General skill course</option>
      <option value="kg">Kindergarten</option>
      <option value="elementary">Elementary School</option>
      <option value="middle_school">Middle School</option>
      <option value="high_school">High School</option>
      <option value="university">University</option>
    </select>
    <label>Thumbnail image URL (optional)</label>
    <input type="text" id="courseThumb" placeholder="https://...">
    <label style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="coursePublished" style="width:auto;"> Publish (visible to students)
    </label>
    <div class="sheet-actions">
      <button class="btn outline" style="flex:1" onclick="closeModal('courseOverlay')">Cancel</button>
      <button class="btn gold" style="flex:1" onclick="saveCourse()">Save Course</button>
    </div>
  </div>
</div>

<!-- Lessons Manager Modal -->
<div class="overlay" id="lessonsOverlay">
  <div class="sheet">
    <button class="close-x" onclick="closeModal('lessonsOverlay')">&times;</button>
    <h2 class="display" id="lessonsModalTitle">Lessons</h2>
    <div id="lessonsList"></div>
    <button class="btn outline btn-full" style="margin-top:14px;" onclick="openLessonModal()">+ Add Lesson</button>
  </div>
</div>

<!-- Lesson Create/Edit Modal -->
<div class="overlay" id="lessonOverlay">
  <div class="sheet">
    <button class="close-x" onclick="closeModal('lessonOverlay')">&times;</button>
    <h2 class="display" id="lessonModalTitle">New Lesson</h2>
    <input type="hidden" id="lessonId">
    <label>Lesson Title</label>
    <input type="text" id="lessonTitle" placeholder="e.g. Understanding Aperture">
    <label>YouTube Video URL</label>
    <input type="text" id="lessonVideo" placeholder="https://youtube.com/watch?v=...">
    <label>Description / Notes</label>
    <textarea id="lessonContent" placeholder="Optional notes for students"></textarea>
    <label>Duration (minutes)</label>
    <input type="number" id="lessonDuration" placeholder="e.g. 12">
    <label>Order</label>
    <input type="number" id="lessonOrder" placeholder="1, 2, 3...">
    <div class="sheet-actions">
      <button class="btn outline" style="flex:1" onclick="closeModal('lessonOverlay')">Cancel</button>
      <button class="btn gold" style="flex:1" onclick="saveLesson()">Save Lesson</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====================================================================
   CONFIG — REQUIRED
   Paste your Supabase project URL + anon key below.
   (Grab these from index.html, skillstream-auth.js, or any other
   SkillStream page that already connects to Supabase.)
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let courses = [];
let activeCourseId = null;

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 2200);
}

function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }

/* ---------- AUTH ----------
   Uses Supabase auth directly so this page doesn't depend on the
   exact shape of skillstream-auth.js (which we didn't have on hand
   when building this). If you want it to match your shared auth
   module's session handling exactly, swap the block below for a
   call into that module instead. */
async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){
    window.location.href = 'skillstream-login.html';
    return;
  }
  currentUser = session.user;
  loadCourses();

  sb.auth.onAuthStateChange((event, session)=>{
    if(!session){ window.location.href = 'skillstream-login.html'; }
  });
}

/* ---------- LOAD COURSES ---------- */
async function loadCourses(){
  const { data, error } = await sb
    .from('courses')
    .select('*, lessons(count)')
    .eq('teacher_id', currentUser.id)
    .order('created_at', { ascending:false });

  if(error){
    document.getElementById('courseList').innerHTML =
      `<div class="empty">Couldn't load courses.<br><small>${error.message}</small></div>`;
    return;
  }
  courses = data || [];
  renderCourses();
}

function renderCourses(){
  const el = document.getElementById('courseList');
  if(courses.length === 0){
    el.innerHTML = `<div class="empty">
      <div class="display">No courses yet</div>
      Tap "+ New Course" below to build your first self-paced course.
    </div>`;
    return;
  }
  el.innerHTML = courses.map(c => {
    const lessonCount = c.lessons?.[0]?.count ?? 0;
    return `
    <div class="course-card">
      <div class="row">
        <div>
          <h3>${escapeHtml(c.title)}</h3>
          <div class="meta">${escapeHtml(c.category || 'General')} · ${lessonCount} lesson${lessonCount===1?'':'s'}</div>
        </div>
        <span class="badge ${c.is_published ? 'live' : 'draft'}">${c.is_published ? 'Published' : 'Draft'}</span>
      </div>
      <div class="card-actions">
        <button class="btn small outline" onclick="manageLessons('${c.id}', '${escapeAttr(c.title)}')">Manage Lessons</button>
        <button class="btn small outline" onclick="editCourse('${c.id}')">Edit</button>
        <button class="btn small danger" onclick="deleteCourse('${c.id}')">Delete</button>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function escapeAttr(s){ return escapeHtml(s).replace(/'/g,"\\'"); }

/* ---------- COURSE CRUD ---------- */
function openCourseModal(){
  document.getElementById('courseModalTitle').textContent = 'New Course';
  document.getElementById('courseId').value = '';
  document.getElementById('courseTitle').value = '';
  document.getElementById('courseDesc').value = '';
  document.getElementById('courseCategory').value = '';
  document.getElementById('courseLevel').value = '';
  document.getElementById('courseThumb').value = '';
  document.getElementById('coursePublished').checked = false;
  openModal('courseOverlay');
}

function editCourse(id){
  const c = courses.find(x => x.id === id);
  if(!c) return;
  document.getElementById('courseModalTitle').textContent = 'Edit Course';
  document.getElementById('courseId').value = c.id;
  document.getElementById('courseTitle').value = c.title || '';
  document.getElementById('courseDesc').value = c.description || '';
  document.getElementById('courseCategory').value = c.category || '';
  document.getElementById('courseLevel').value = c.education_level || '';
  document.getElementById('courseThumb').value = c.thumbnail_url || '';
  document.getElementById('coursePublished').checked = !!c.is_published;
  openModal('courseOverlay');
}

async function saveCourse(){
  const id = document.getElementById('courseId').value;
  const title = document.getElementById('courseTitle').value.trim();
  if(!title){ toast('Please enter a title'); return; }

  const payload = {
    title,
    description: document.getElementById('courseDesc').value.trim(),
    category: document.getElementById('courseCategory').value.trim(),
    education_level: document.getElementById('courseLevel').value || null,
    thumbnail_url: document.getElementById('courseThumb').value.trim(),
    is_published: document.getElementById('coursePublished').checked,
    teacher_id: currentUser.id
  };

  let error;
  if(id){
    ({ error } = await sb.from('courses').update(payload).eq('id', id));
  } else {
    ({ error } = await sb.from('courses').insert(payload));
  }

  if(error){ toast('Error: ' + error.message); return; }
  toast(id ? 'Course updated' : 'Course created');
  closeModal('courseOverlay');
  loadCourses();
}

async function deleteCourse(id){
  if(!confirm('Delete this course and all its lessons? This cannot be undone.')) return;
  const { error } = await sb.from('courses').delete().eq('id', id);
  if(error){ toast('Error: ' + error.message); return; }
  toast('Course deleted');
  loadCourses();
}

/* ---------- LESSONS ---------- */
let activeLessons = [];

async function manageLessons(courseId, title){
  activeCourseId = courseId;
  document.getElementById('lessonsModalTitle').textContent = title;
  document.getElementById('lessonsList').innerHTML = '<div class="loading">Loading lessons…</div>';
  openModal('lessonsOverlay');
  await loadLessons();
}

async function loadLessons(){
  const { data, error } = await sb
    .from('lessons')
    .select('*')
    .eq('course_id', activeCourseId)
    .order('order_index', { ascending: true });

  if(error){
    document.getElementById('lessonsList').innerHTML = `<div class="empty">${error.message}</div>`;
    return;
  }
  activeLessons = data || [];
  renderLessons();
}

function renderLessons(){
  const el = document.getElementById('lessonsList');
  if(activeLessons.length === 0){
    el.innerHTML = '<div class="empty">No lessons yet. Add your first one below.</div>';
    return;
  }
  el.innerHTML = activeLessons.map(l => `
    <div class="lesson-row">
      <div>
        <div class="l-title">${l.order_index ?? ''}. ${escapeHtml(l.title)}</div>
        <div class="l-meta">${l.duration_minutes ? l.duration_minutes + ' min' : ''}</div>
      </div>
      <div class="lesson-actions">
        <button class="icon-btn" onclick="editLesson('${l.id}')">✏️</button>
        <button class="icon-btn" onclick="deleteLesson('${l.id}')">🗑️</button>
      </div>
    </div>
  `).join('');
}

function openLessonModal(){
  document.getElementById('lessonModalTitle').textContent = 'New Lesson';
  document.getElementById('lessonId').value = '';
  document.getElementById('lessonTitle').value = '';
  document.getElementById('lessonVideo').value = '';
  document.getElementById('lessonContent').value = '';
  document.getElementById('lessonDuration').value = '';
  document.getElementById('lessonOrder').value = (activeLessons.length + 1);
  openModal('lessonOverlay');
}

function editLesson(id){
  const l = activeLessons.find(x => x.id === id);
  if(!l) return;
  document.getElementById('lessonModalTitle').textContent = 'Edit Lesson';
  document.getElementById('lessonId').value = l.id;
  document.getElementById('lessonTitle').value = l.title || '';
  document.getElementById('lessonVideo').value = l.video_url || '';
  document.getElementById('lessonContent').value = l.content || '';
  document.getElementById('lessonDuration').value = l.duration_minutes || '';
  document.getElementById('lessonOrder').value = l.order_index || '';
  openModal('lessonOverlay');
}

async function saveLesson(){
  const id = document.getElementById('lessonId').value;
  const title = document.getElementById('lessonTitle').value.trim();
  if(!title){ toast('Please enter a lesson title'); return; }

  const payload = {
    course_id: activeCourseId,
    title,
    video_url: document.getElementById('lessonVideo').value.trim(),
    content: document.getElementById('lessonContent').value.trim(),
    duration_minutes: parseInt(document.getElementById('lessonDuration').value) || null,
    order_index: parseInt(document.getElementById('lessonOrder').value) || null
  };

  let error;
  if(id){
    ({ error } = await sb.from('lessons').update(payload).eq('id', id));
  } else {
    ({ error } = await sb.from('lessons').insert(payload));
  }

  if(error){ toast('Error: ' + error.message); return; }
  toast(id ? 'Lesson updated' : 'Lesson added');
  closeModal('lessonOverlay');
  loadLessons();
  loadCourses(); // refresh lesson counts
}

async function deleteLesson(id){
  if(!confirm('Delete this lesson?')) return;
  const { error } = await sb.from('lessons').delete().eq('id', id);
  if(error){ toast('Error: ' + error.message); return; }
  toast('Lesson deleted');
  loadLessons();
  loadCourses();
}

initAuth();
</script>
</body>
</html>
