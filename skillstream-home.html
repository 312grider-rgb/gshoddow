<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome — Paradise Of The Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#141F38; --ink-2:#1F2E52; --gold:#C9A24E; --gold-light:#E4C583;
    --cream:#FBF7EF; --sage:#6B8F71; --charcoal:#2B2B2B; --line:#E9E2D2;
    --shadow-card:0 8px 24px rgba(20,31,56,0.08);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--charcoal); min-height:100vh; -webkit-font-smoothing:antialiased;}
  h1,h2,.display{font-family:'Fraunces',serif; letter-spacing:-0.01em;}
  a{transition:transform 0.18s var(--ease);}
  a:active{transform:scale(0.97);}

  header.top{background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%); color:var(--cream); padding:36px 20px 34px; text-align:center;}
  header.top .eyebrow{font-size:11.5px; letter-spacing:2.2px; text-transform:uppercase; color:var(--gold-light); margin-bottom:8px; font-weight:600;}
  header.top h1{margin:0; font-size:24px; font-weight:600;}
  header.top p{margin:10px 0 0; font-size:14px; opacity:0.8;}

  .wrap{padding:22px 20px;}

  .view-card{
    display:block; background:#fff; border-radius:20px; padding:24px; margin-bottom:16px;
    box-shadow:var(--shadow-card); text-decoration:none; color:inherit;
  }
  .view-card .icon{font-size:28px; margin-bottom:10px;}
  .view-card h2{margin:0 0 6px; font-size:19px; color:var(--ink);}
  .view-card p{margin:0; font-size:13.5px; color:#8a8474; line-height:1.5;}
  .view-card .go{margin-top:14px; font-size:13px; font-weight:700; color:var(--gold);}
  .view-card.suggested{border:2px solid var(--gold-light);}
  .suggested-tag{
    display:inline-block; background:var(--gold-light); color:var(--ink); font-size:10.5px; font-weight:700;
    padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:10px;
  }

  .loading{text-align:center; padding:60px 20px; color:#8a8474;}

  .inspiration-card{
    background:linear-gradient(135deg, var(--ink) 0%, var(--ink-2) 100%);
    color:var(--cream); border-radius:20px; padding:22px; margin-bottom:20px;
    box-shadow:var(--shadow-card);
  }
  .inspiration-card .kicker{
    font-size:11px; letter-spacing:1.8px; text-transform:uppercase; color:var(--gold-light);
    font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:8px;
  }
  .inspiration-card .quote{font-family:'Fraunces',serif; font-size:18px; line-height:1.5; margin-bottom:6px;}
  .inspiration-card .quote-source{font-size:12px; opacity:0.65; margin-bottom:16px;}
  .inspiration-row{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .streak-pill{
    display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.1); padding:8px 14px;
    border-radius:20px; font-size:13px; font-weight:600;
  }
  .streak-pill .flame{font-size:15px;}
  .streak-btn{
    background:var(--gold); color:var(--ink); border:none; padding:10px 18px; border-radius:11px;
    font-size:13.5px; font-weight:700; cursor:pointer;
  }
  .streak-btn:disabled{background:rgba(255,255,255,0.15); color:var(--cream); opacity:0.8;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">Learning Never Ends</div>
  <h1 id="greeting">Welcome</h1>
  <p>Paradise Of The Eternal Learners</p>
</header>

<div class="wrap" id="content">
  <div id="inspirationCard"></div>
  <div class="loading" id="viewsLoading">Loading…</div>
  <div id="viewCards"></div>
</div>

<script>
/* ====================================================================
   CONFIG — REQUIRED — same project as your other SkillStream pages
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ window.location.href = 'skillstream-login.html'; return; }

  const { data: profile } = await sb.from('profiles').select('full_name, role').eq('id', session.user.id).maybeSingle();
  const name = profile?.full_name ? profile.full_name.split(' ')[0] : '';
  document.getElementById('greeting').textContent = name ? `Welcome, ${name}` : 'Welcome';

  const role = profile?.role || 'student';

  document.getElementById('viewsLoading').style.display = 'none';
  document.getElementById('viewCards').innerHTML = `
    <a class="view-card ${role === 'student' ? 'suggested' : ''}" href="skillstream-dashboard.html">
      ${role === 'student' ? '<span class="suggested-tag">Your account</span>' : ''}
      <div class="icon">🎓</div>
      <h2>Continue as Student</h2>
      <p>Browse and take courses, track your progress, chat with your AI Tutor, and earn certificates.</p>
      <div class="go">Go to Student Dashboard →</div>
    </a>

    <a class="view-card ${role === 'teacher' ? 'suggested' : ''}" href="skillstream-teacher-dashboard.html">
      ${role === 'teacher' ? '<span class="suggested-tag">Your account</span>' : ''}
      <div class="icon">🧑‍🏫</div>
      <h2>Continue as Teacher</h2>
      <p>Create and publish courses, manage lessons, and track how learners are engaging with your content.</p>
      <div class="go">Go to Teacher Dashboard →</div>
    </a>
  `;

  loadInspiration(session.user.id);
}

init();

/* ---------- DAILY INSPIRATION + STREAK ----------
   Uses the challenge_completions table: one row per user per calendar
   day they mark as done. Streak = consecutive days ending today or
   yesterday (so it doesn't reset the instant midnight passes). */
const DAILY_QUOTES = [
  { text: "The beautiful thing about learning is that no one can take it away from you.", source: "B.B. King" },
  { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", source: "Mahatma Gandhi" },
  { text: "An investment in knowledge always pays the best interest.", source: "Benjamin Franklin" },
  { text: "The expert in anything was once a beginner.", source: "Helen Hayes" },
  { text: "Learning never exhausts the mind.", source: "Leonardo da Vinci" },
  { text: "Education is not the filling of a pail, but the lighting of a fire.", source: "William Butler Yeats" },
  { text: "The more that you read, the more things you will know.", source: "Dr. Seuss" },
  { text: "You don't have to be great to start, but you have to start to be great.", source: "Zig Ziglar" },
  { text: "Small daily improvements are the key to staggering long-term results.", source: "James Clear" },
  { text: "It always seems impossible until it's done.", source: "Nelson Mandela" }
];

function dayOfYear(date){
  const start = new Date(date.getFullYear(), 0, 0);
  const diff = date - start;
  return Math.floor(diff / (1000 * 60 * 60 * 24));
}

function todayDateString(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function renderQuote(){
  const q = DAILY_QUOTES[dayOfYear(new Date()) % DAILY_QUOTES.length];
  return q;
}

async function loadInspiration(userId){
  const el = document.getElementById('inspirationCard');
  const quote = renderQuote();

  const { data, error } = await sb
    .from('challenge_completions')
    .select('completed_date')
    .eq('user_id', userId)
    .order('completed_date', { ascending:false })
    .limit(60);

  let streak = 0;
  let doneToday = false;

  if(!error && data){
    const dates = new Set(data.map(r => r.completed_date));
    const today = todayDateString();
    doneToday = dates.has(today);

    // Count consecutive days backward from today (or yesterday if today not yet done)
    let cursor = new Date();
    if(!doneToday) cursor.setDate(cursor.getDate() - 1);

    while(true){
      const key = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-' + String(cursor.getDate()).padStart(2,'0');
      if(dates.has(key)){
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else {
        break;
      }
    }
  }

  el.innerHTML = `
    <div class="inspiration-card">
      <div class="kicker">✨ Daily Inspiration</div>
      <div class="quote">"${quote.text}"</div>
      <div class="quote-source">— ${quote.source}</div>
      <div class="inspiration-row">
        <div class="streak-pill"><span class="flame">🔥</span> ${streak} day${streak===1?'':'s'} streak</div>
        <button class="streak-btn" id="streakBtn" ${doneToday ? 'disabled' : ''} onclick="markTodayDone('${userId}')">
          ${doneToday ? '✓ Done Today' : 'Mark Today Done'}
        </button>
      </div>
    </div>
  `;
}

async function markTodayDone(userId){
  const { error } = await sb.from('challenge_completions').upsert({
    user_id: userId,
    completed_date: todayDateString()
  }, { onConflict: 'user_id,completed_date' });

  if(error){ alert('Error: ' + error.message); return; }
  loadInspiration(userId);
}
</script>
</body>
</html>
