function applyHomeLanguage(lang){
  const t = HOME_TRANSLATIONS[lang] || HOME_TRANSLATIONS.en;
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('dir', t.dir);
  document.getElementById('txt-eyebrow').textContent = t.eyebrow;
  document.getElementById('txt-tagline').textContent = t.tagline;
  document.getElementById('greeting').textContent = window._homeName ? `${t.welcome}, ${window._homeName}` : t.welcome;
  document.getElementById('langSwitcher').value = lang;

  const role = window._homeRole || 'student';
  document.getElementById('viewCards').innerHTML = `
    <a class="view-card ${role === 'student' ? 'suggested' : ''}" href="skillstream-dashboard.html">
      ${role === 'student' ? `<span class="suggested-tag">${t.yourAccount}</span>` : ''}
      <div class="icon">🎓</div>
      <h2>${t.studentTitle}</h2>
      <p>${t.studentDesc}</p>
      <div class="go">${t.studentGo}</div>
    </a>

    <a class="view-card ${role === 'teacher' ? 'suggested' : ''}" href="skillstream-teacher-dashboard.html">
      ${role === 'teacher' ? `<span class="suggested-tag">${t.yourAccount}</span>` : ''}
      <div class="icon">🧑‍🏫</div>
      <h2>${t.teacherTitle}</h2>
      <p>${t.teacherDesc}</p>
      <div class="go">${t.teacherGo}</div>
    </a>

    <a class="view-card" href="skillstream-ai-hub.html">
      <div class="icon">🤖</div>
      <h2>${t.aiTitle}</h2>
      <p>${t.aiDesc}</p>
      <div class="go">${t.aiGo}</div>
    </a>
  `;
}

function changeHomeLanguage(){
  const lang = document.getElementById('langSwitcher').value;
  localStorage.setItem('language', lang);
  applyHomeLanguage(lang);
}

async function loadLiveClasses(){
  const el = document.getElementById('liveClassesSection');

  const { data: myProfile } = await sb.from('profiles').select('grade_level').eq('id', inspUserId).maybeSingle();
  const myGrade = myProfile?.grade_level || null;

  const { data, error } = await sb
    .from('live_sessions')
    .select('*, profiles(full_name)')
    .eq('status', 'live')
    .eq('is_public', true)
    .order('started_at', { ascending:false });

  let html = '';

  if(!error && data && data.length > 0){
    // Only show classes with no grade target, or ones matching this student's own registered grade
    const visible = data.filter(s => !s.target_grade_level || s.target_grade_level === myGrade);

    if(visible.length > 0){
      html += `<div class="section-title-home">🔴 Live Now</div>` + visible.map(s => `
        <div class="live-class-card">
          <span class="live-class-dot"></span>
          <div style="flex:1;">
            <h3>${escapeHtml(s.title)}</h3>
            <p>with ${escapeHtml(s.profiles?.full_name || 'a teacher')}${s.target_grade_level ? ' · ' + escapeHtml(s.target_grade_level.replace('_',' ')) : ''}</p>
          </div>
          <a class="live-join-btn" href="skillstream-live-video.html?room=${encodeURIComponent(s.room_name)}&session=${s.id}&title=${encodeURIComponent(s.title)}">Join</a>
        </div>
      `).join('');
    }
  }

  html += `
    <div class="live-class-card" style="flex-direction:column; align-items:stretch; gap:8px;">
      <div style="font-size:13px; font-weight:700; color:var(--ink);">Have a private class code?</div>
      <div style="display:flex; gap:8px;">
        <input type="text" id="joinCodeInput" placeholder="e.g. AB12CD" style="flex:1; padding:9px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:14px; text-transform:uppercase;">
        <button onclick="joinByCode()" style="background:var(--ink); color:#fff; border:none; padding:9px 16px; border-radius:9px; font-weight:700; font-size:13px;">Join</button>
      </div>
    </div>
  `;

  el.innerHTML = html;
}

async function joinByCode(){
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if(!code){ alert('Enter a join code first.'); return; }

  const { data, error } = await sb
    .from('live_sessions')
    .select('*')
    .eq('join_code', code)
    .eq('status', 'live')
    .maybeSingle();

  if(error || !data){ alert('No live class found with that code.'); return; }

  window.location.href = `skillstream-live-video.html?room=${encodeURIComponent(data.room_name)}&session=${data.id}&title=${encodeURIComponent(data.title)}`;
}

  { title: "The Elements of Style", author: "Strunk & White", note: "A classic, concise guide to clear writing." },
  { title: "A Short History of Nearly Everything", author: "Bill Bryson", note: "An accessible tour through science and the universe." },
  { title: "Deep Work", author: "Cal Newport", note: "On the value of focused, distraction-free effort in a noisy world." },
  { title: "The Alchemist", author: "Paulo Coelho", note: "A fable about following your personal calling." }
];

const CHALLENGES = [
  "Complete one full lesson in any course today.",
  "Write down one new thing you learned yesterday and why it matters.",
  "Teach someone else something you learned this week — teaching cements learning.",
  "Read for at least 15 minutes on a topic outside your usual interests.",
  "Try explaining a concept you're studying in one simple sentence.",
  "Review your notes from a few days ago — repetition builds memory.",
  "Ask your AI Tutor one question you've been putting off.",
  "Set a 25-minute focused study block with no phone distractions.",
  "Write a one-paragraph summary of something you studied this week.",
  "Look up the origin of one word you use often."
];

const INSP_CATEGORIES = [
  { key:'quote', label:'📖 Quote' },
  { key:'word', label:'🧠 Word' },
  { key:'history', label:'🌍 History' },
  { key:'science', label:'🔬 Science' },
  { key:'code', label:'💻 Code Tip' },
  { key:'book', label:'📚 Book' },
  { key:'challenge', label:'🎯 Challenge' }
];

let inspCurrentTab = 'quote';
let inspUserId = null;
let inspDoneToday = false;
let inspStreak = 0;

function dayOfYear(date){
  const start = new Date(date.getFullYear(), 0, 0);
  return Math.floor((date - start) / (1000 * 60 * 60 * 24));
}

function todayDateString(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function pickOfDay(arr){
  return arr[dayOfYear(new Date()) % arr.length];
}

function renderInspContent(){
  const idx = dayOfYear(new Date());
  let eyebrow = '', main = '', sub = '';

  if(inspCurrentTab === 'quote'){
    const q = pickOfDay(QUOTES);
    eyebrow = 'Quote of the Day'; main = `"${q.text}"`; sub = `— ${q.source}`;
  } else if(inspCurrentTab === 'word'){
    const w = pickOfDay(WORDS);
    eyebrow = 'Word of the Day'; main = `${w.word} (${w.pos})`; sub = w.def;
  } else if(inspCurrentTab === 'history'){
    const h = pickOfDay(HISTORY);
    eyebrow = 'Historical Spotlight'; main = h.text; sub = `Year: ${h.year}`;
  } else if(inspCurrentTab === 'science'){
    eyebrow = 'Scientific Fact of the Day'; main = pickOfDay(SCIENCE); sub = '';
  } else if(inspCurrentTab === 'code'){
    eyebrow = 'Programming Tip of the Day'; main = pickOfDay(PROG_TIPS); sub = '';
  } else if(inspCurrentTab === 'book'){
    const b = pickOfDay(BOOKS);
    eyebrow = 'Book Recommendation'; main = `${b.title} — ${b.author}`; sub = b.note;
  } else if(inspCurrentTab === 'challenge'){
    eyebrow = "Today's Learning Challenge"; main = pickOfDay(CHALLENGES); sub = '';
  }

  document.getElementById('inspBody').innerHTML = `
    <div class="eyebrow2">${eyebrow}</div>
    <div class="main-text">${main}</div>
    ${sub ? `<div class="sub-text">${sub}</div>` : ''}
  `;
}

function switchInspTab(key){
  inspCurrentTab = key;
  document.querySelectorAll('.insp-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.key === key);
  });
  renderInspContent();
}

async function loadInspiration(userId){
  inspUserId = userId;
  const el = document.getElementById('inspirationCard');

  el.innerHTML = `
    <div class="inspiration-card">
      <div class="kicker">✨ Daily Inspiration</div>
      <div class="insp-tabs" id="inspTabs">
        ${INSP_CATEGORIES.map(c => `<button class="insp-tab ${c.key==='quote'?'active':''}" data-key="${c.key}" onclick="switchInspTab('${c.key}')">${c.label}</button>`).join('')}
      </div>
      <div class="insp-body" id="inspBody"></div>
      <div class="inspiration-row">
        <div class="streak-pill"><span class="flame">🔥</span> <span id="streakText">0 days</span> streak</div>
        <button class="streak-btn" id="streakBtn" onclick="markTodayDone()">Mark Today Done</button>
      </div>
    </div>
  `;
  renderInspContent();
  await loadStreak(userId);
}

async function loadStreak(userId){
  const { data, error } = await sb
    .from('challenge_completions')
    .select('completed_date')
    .eq('user_id', userId)
    .order('completed_date', { ascending:false })
    .limit(60);

  let streak = 0;
  let doneToday = false;

  if(!error && data){
    const dates = new Set(data.map(r => r.completed_date));
    const today = todayDateString();
    doneToday = dates.has(today);

    let cursor = new Date();
    if(!doneToday) cursor.setDate(cursor.getDate() - 1);

    while(true){
      const key = cursor.getFullYear() + '-' + String(cursor.getMonth()+1).padStart(2,'0') + '-' + String(cursor.getDate()).padStart(2,'0');
      if(dates.has(key)){
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      } else break;
    }
  }

  inspStreak = streak;
  inspDoneToday = doneToday;
  document.getElementById('streakText').textContent = `${streak} day${streak===1?'':'s'}`;
  const btn = document.getElementById('streakBtn');
  btn.disabled = doneToday;
  btn.textContent = doneToday ? '✓ Done Today' : 'Mark Today Done';
}

async function markTodayDone(){
  const { error } = await sb.from('challenge_completions').upsert({
    user_id: inspUserId,
    completed_date: todayDateString()
  }, { onConflict: 'user_id,completed_date' });

  if(error){ alert('Error: ' + error.message); return; }
  loadStreak(inspUserId);
}

/* ---------- COMMUNITY SPOTLIGHT (Student/Teacher of Day/Week/Month) ---------- */
let spotlightPeriod = 'day';

function renderSpotlightShell(){
  const el = document.getElementById('spotlightSection');
  el.innerHTML = `
    <div class="section-title-home">🌟 Community Spotlight</div>
    <div class="spotlight-tabs">
      <button class="spotlight-tab active" data-period="day" onclick="switchSpotlight('day')">Today</button>
      <button class="spotlight-tab" data-period="week" onclick="switchSpotlight('week')">This Week</button>
      <button class="spotlight-tab" data-period="month" onclick="switchSpotlight('month')">This Month</button>
    </div>
    <div class="spotlight-grid" id="spotlightGrid"><div class="loading">Loading…</div></div>
  `;
}

function switchSpotlight(period){
  spotlightPeriod = period;
  document.querySelectorAll('.spotlight-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.period === period);
  });
  loadSpotlight();
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function loadSpotlight(){
  const el = document.getElementById('spotlightGrid');
  el.innerHTML = '<div class="loading">Loading…</div>';

  const [{ data: studentData, error: sErr }, { data: teacherData, error: tErr }] = await Promise.all([
    sb.rpc('get_top_student', { p_period: spotlightPeriod }),
    sb.rpc('get_top_teacher', { p_period: spotlightPeriod })
  ]);

  const student = (!sErr && studentData && studentData[0]) ? studentData[0] : null;
  const teacher = (!tErr && teacherData && teacherData[0]) ? teacherData[0] : null;

  let html = '';

  if(student && student.lessons_done > 0){
    const initials = (student.full_name || '?').trim().charAt(0).toUpperCase();
    html += `
      <div class="spotlight-card">
        <span class="role-icon">🎓</span>
        <div class="spotlight-avatar">${student.avatar_url ? `<img src="${student.avatar_url}">` : initials}</div>
        <div class="spotlight-info">
          <div class="s-role">Student Spotlight</div>
          <div class="s-name">${escapeHtml(student.full_name || 'Learner')}</div>
          <div class="s-stat">${student.lessons_done} lesson${student.lessons_done===1?'':'s'} completed</div>
        </div>
      </div>`;
  }

  if(teacher && teacher.certs_issued > 0){
    const initials = (teacher.full_name || '?').trim().charAt(0).toUpperCase();
    html += `
      <div class="spotlight-card">
        <span class="role-icon">🧑‍🏫</span>
        <div class="spotlight-avatar">${teacher.avatar_url ? `<img src="${teacher.avatar_url}">` : initials}</div>
        <div class="spotlight-info">
          <div class="s-role">Teacher Spotlight</div>
          <div class="s-name">${escapeHtml(teacher.full_name || 'Teacher')}</div>
          <div class="s-stat">${teacher.certs_issued} certificate${teacher.certs_issued===1?'':'s'} issued</div>
        </div>
      </div>`;
  }

  if(!html){
    html = `<div class="spotlight-empty">No activity yet for this period — be the first to make the spotlight!</div>`;
  }

  el.innerHTML = html;
}
</script>

<script>
  function updateLiveClock(){
    var el = document.getElementById('liveClockBadge');
    if(!el) return;
    var now = new Date();
    var h = String(now.getHours()).padStart(2,'0');
    var m = String(now.getMinutes()).padStart(2,'0');
    var s = String(now.getSeconds()).padStart(2,'0');
    el.textContent = '🕐 ' + h + ':' + m + ':' + s;
  }
  updateLiveClock();
  setInterval(updateLiveClock, 1000);
</script>
