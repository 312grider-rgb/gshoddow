<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess — Paradise Of The Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
  :root{
    --ink:#141F38; --ink-2:#1F2E52; --gold:#C9A24E; --gold-light:#E4C583;
    --cream:#FBF7EF; --sage:#6B8F71; --charcoal:#2B2B2B; --line:#E9E2D2;
    --shadow-soft:0 2px 10px rgba(20,31,56,0.06);
    --shadow-card:0 8px 24px rgba(20,31,56,0.08);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--charcoal); -webkit-font-smoothing:antialiased; padding-bottom:30px;}
  h1,h2,h3{font-family:'Syne',sans-serif;}

  header.top{background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%); color:var(--cream); padding:20px; text-align:center;}
  header.top h1{margin:0; font-size:22px;}
  header.top p{margin:6px 0 0; font-size:13px; opacity:0.75;}

  .wrap{padding:16px; max-width:460px; margin:0 auto;}

  .mode-card{
    background:#fff; border-radius:16px; padding:18px; margin-bottom:14px; box-shadow:var(--shadow-card);
    text-align:center; cursor:pointer;
  }
  .mode-card .icon{font-size:30px; margin-bottom:8px;}
  .mode-card h3{margin:0 0 4px; font-size:16px;}
  .mode-card p{margin:0; font-size:12.5px; color:#8a8474;}

  .join-row{display:flex; gap:8px; margin-top:10px;}
  .join-row input{flex:1; padding:10px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:14px; text-transform:uppercase; text-align:center;}
  .join-row button{background:var(--ink); color:#fff; border:none; padding:0 16px; border-radius:9px; font-weight:700;}

  #gameStatus{
    background:#fff; border-radius:14px; padding:12px 16px; margin-bottom:12px; box-shadow:var(--shadow-soft);
    display:flex; justify-content:space-between; align-items:center; font-size:13.5px; font-weight:600; color:var(--ink);
  }
  #gameCode{font-size:11.5px; color:var(--gold); font-weight:700;}

  #board{
    display:grid; grid-template-columns:repeat(8, 1fr); width:100%; aspect-ratio:1;
    border-radius:12px; overflow:hidden; box-shadow:var(--shadow-card); margin-bottom:14px;
  }
  .sq{
    display:flex; align-items:center; justify-content:center; font-size:min(7vw, 32px);
    position:relative; cursor:pointer; user-select:none;
  }
  .sq.light{background:#F3EAD8;}
  .sq.dark{background:#B08B5F;}
  .sq.selected{background:#C9A24E !important;}
  .sq.legal::after{
    content:''; position:absolute; width:26%; height:26%; border-radius:50%; background:rgba(20,31,56,0.35);
  }
  .sq.legal.has-piece::after{
    width:90%; height:90%; border-radius:50%; background:none; border:3px solid rgba(192,82,58,0.6);
  }
  .sq .piece{ line-height:1; }
  .sq.white-piece .piece{ color:#fff; text-shadow:0 1px 2px rgba(0,0,0,0.5); }
  .sq.black-piece .piece{ color:#1a1a1a; }

  .controls-row{display:flex; gap:8px; margin-bottom:14px;}
  .controls-row button{
    flex:1; background:#fff; border:1.5px solid var(--line); padding:11px; border-radius:10px;
    font-size:13px; font-weight:700; color:var(--ink);
  }

  .back-link{display:block; text-align:center; margin-top:10px; font-size:14px; font-weight:600; color:var(--ink); text-decoration:none;}
  .hidden{display:none !important;}
</style>
</head>
<body>

<header class="top">
  <h1>♟️ Chess</h1>
  <p>Play against the AI, or challenge a friend online</p>
</header>

<div class="wrap">

  <div id="modePicker">
    <div class="mode-card" onclick="startVsAI()">
      <div class="icon">🤖</div>
      <h3>Play vs AI</h3>
      <p>Practice anytime, no opponent needed</p>
    </div>
    <div class="mode-card" onclick="createOnlineGame()">
      <div class="icon">🌐</div>
      <h3>Create Online Game</h3>
      <p>Get a code to challenge a friend</p>
    </div>
    <div class="mode-card">
      <div class="icon">🔑</div>
      <h3>Join a Game</h3>
      <p>Enter a code your friend shared</p>
      <div class="join-row" onclick="event.stopPropagation()">
        <input type="text" id="joinCodeInput" placeholder="e.g. AB12CD" maxlength="6">
        <button onclick="joinOnlineGame()">Join</button>
      </div>
    </div>
  </div>

  <div id="gameView" class="hidden">
    <div id="gameStatus">
      <span id="statusText">White to move</span>
      <span id="gameCode"></span>
    </div>
    <div id="board"></div>
    <div class="controls-row">
      <button onclick="undoMove()" id="undoBtn">↩ Undo</button>
      <button onclick="resetGame()">🔄 New Game</button>
    </div>
  </div>

  <a class="back-link" href="skillstream-dashboard.html">&larr; Back to Dashboard</a>
</div>

<script>
/* ====================================================================
   CONFIG — REQUIRED — same project as your other SkillStream pages
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;

const PIECE_UNICODE = {
  p:'♟', r:'♜', n:'♞', b:'♝', q:'♛', k:'♚',
  P:'♙', R:'♖', N:'♘', B:'♗', Q:'♕', K:'♔'
};

let game = null;
let mode = null;
let selectedSquare = null;
let legalTargets = [];
let onlineGameId = null;
let onlineColor = null;
let realtimeChannel = null;
let aiThinking = false;

async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ window.location.href = 'skillstream-login.html'; return; }
  currentUser = session.user;
}
initAuth();

function startVsAI(){
  mode = 'ai';
  game = new Chess();
  onlineGameId = null;
  document.getElementById('modePicker').classList.add('hidden');
  document.getElementById('gameView').classList.remove('hidden');
  document.getElementById('gameCode').textContent = '';
  document.getElementById('undoBtn').classList.remove('hidden');
  renderBoard();
  updateStatus();
}

function resetGame(){
  if(mode === 'ai'){ startVsAI(); return; }
  if(mode === 'online'){
    document.getElementById('gameView').classList.add('hidden');
    document.getElementById('modePicker').classList.remove('hidden');
    if(realtimeChannel) sb.removeChannel(realtimeChannel);
  }
}

function undoMove(){
  if(mode !== 'ai') return;
  game.undo();
  game.undo();
  selectedSquare = null; legalTargets = [];
  renderBoard();
  updateStatus();
}

function renderBoard(){
  const boardEl = document.getElementById('board');
  const position = game.board();
  boardEl.innerHTML = '';

  for(let r = 0; r < 8; r++){
    for(let c = 0; c < 8; c++){
      const file = 'abcdefgh'[c];
      const rank = 8 - r;
      const squareName = file + rank;
      const piece = position[r][c];

      const sq = document.createElement('div');
      sq.className = 'sq ' + (((r + c) % 2 === 0) ? 'light' : 'dark');
      sq.dataset.square = squareName;

      if(piece){
        sq.classList.add(piece.color === 'w' ? 'white-piece' : 'black-piece');
        sq.innerHTML = `<span class="piece">${PIECE_UNICODE[piece.color === 'w' ? piece.type.toUpperCase() : piece.type]}</span>`;
      }

      if(squareName === selectedSquare) sq.classList.add('selected');
      if(legalTargets.includes(squareName)){
        sq.classList.add('legal');
        if(piece) sq.classList.add('has-piece');
      }

      sq.onclick = () => onSquareClick(squareName);
      boardEl.appendChild(sq);
    }
  }
}

function onSquareClick(squareName){
  if(aiThinking) return;
  if(mode === 'online' && game.turn() !== onlineColor) return;

  const piece = game.get(squareName);

  if(selectedSquare && legalTargets.includes(squareName)){
    makeMove(selectedSquare, squareName);
    return;
  }

  if(piece && piece.color === game.turn()){
    selectedSquare = squareName;
    legalTargets = game.moves({ square: squareName, verbose:true }).map(m => m.to);
  } else {
    selectedSquare = null;
    legalTargets = [];
  }
  renderBoard();
}

function makeMove(from, to){
  const move = game.move({ from, to, promotion:'q' });
  selectedSquare = null; legalTargets = [];
  if(!move) { renderBoard(); return; }

  renderBoard();
  updateStatus();

  if(mode === 'online'){
    syncOnlineGame();
  } else if(mode === 'ai' && !game.game_over()){
    aiThinking = true;
    document.getElementById('statusText').textContent = "AI is thinking…";
    setTimeout(() => {
      makeAiMove();
      aiThinking = false;
    }, 500);
  }
}

function updateStatus(){
  const el = document.getElementById('statusText');
  if(game.in_checkmate()){
    el.textContent = (game.turn() === 'w' ? 'Black' : 'White') + ' wins by checkmate!';
  } else if(game.in_draw() || game.in_stalemate()){
    el.textContent = "It's a draw.";
  } else if(game.in_check()){
    el.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' is in check';
  } else {
    el.textContent = (game.turn() === 'w' ? 'White' : 'Black') + ' to move';
  }
}

const PIECE_VALUES = { p:1, n:3, b:3, r:5, q:9, k:0 };

function evaluateBoard(g){
  let score = 0;
  const board = g.board();
  for(const row of board){
    for(const cell of row){
      if(!cell) continue;
      const val = PIECE_VALUES[cell.type];
      score += cell.color === 'w' ? val : -val;
    }
  }
  return score;
}

function makeAiMove(){
  const moves = game.moves({ verbose:true });
  if(moves.length === 0) return;

  let bestMove = null;
  let bestScore = -Infinity;

  for(const m of moves){
    game.move(m);
    let score = -evaluateBoard(game);

    const replies = game.moves({ verbose:true });
    if(replies.length > 0){
      let worstReply = Infinity;
      for(const r of replies){
        game.move(r);
        const replyScore = -evaluateBoard(game);
        if(replyScore < worstReply) worstReply = replyScore;
        game.undo();
      }
      score = -worstReply;
    }

    game.undo();
    score += (Math.random() - 0.5) * 0.5;

    if(score > bestScore){
      bestScore = score;
      bestMove = m;
    }
  }

  if(bestMove){
    game.move(bestMove);
    renderBoard();
    updateStatus();
  }
}

function genCode(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

async function createOnlineGame(){
  const code = genCode();
  game = new Chess();

  const { data, error } = await sb.from('chess_games').insert({
    code,
    fen: game.fen(),
    white_player: currentUser.id,
    black_player: null,
    status: 'waiting'
  }).select().single();

  if(error){ alert('Error: ' + error.message); return; }

  onlineGameId = data.id;
  onlineColor = 'w';
  mode = 'online';

  document.getElementById('modePicker').classList.add('hidden');
  document.getElementById('gameView').classList.remove('hidden');
  document.getElementById('gameCode').textContent = 'Code: ' + code;
  document.getElementById('undoBtn').classList.add('hidden');
  document.getElementById('statusText').textContent = 'Waiting for opponent to join…';

  renderBoard();
  subscribeToGame();
}

async function joinOnlineGame(){
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if(!code){ alert('Enter a game code first.'); return; }

  const { data, error } = await sb.from('chess_games').select('*').eq('code', code).maybeSingle();
  if(error || !data){ alert('No game found with that code.'); return; }
  if(data.black_player){ alert('This game already has two players.'); return; }

  const { error: joinErr } = await sb.from('chess_games').update({
    black_player: currentUser.id,
    status: 'active'
  }).eq('id', data.id);
  if(joinErr){ alert('Error: ' + joinErr.message); return; }

  onlineGameId = data.id;
  onlineColor = 'b';
  mode = 'online';
  game = new Chess(data.fen);

  document.getElementById('modePicker').classList.add('hidden');
  document.getElementById('gameView').classList.remove('hidden');
  document.getElementById('gameCode').textContent = 'Code: ' + code;
  document.getElementById('undoBtn').classList.add('hidden');

  renderBoard();
  updateStatus();
  subscribeToGame();
}

function subscribeToGame(){
  realtimeChannel = sb
    .channel('chess_game_' + onlineGameId)
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'chess_games', filter:`id=eq.${onlineGameId}` }, (payload) => {
      const row = payload.new;
      if(row.status === 'active' && document.getElementById('statusText').textContent.includes('Waiting')){
        document.getElementById('statusText').textContent = 'Opponent joined! Game on.';
      }
      game = new Chess(row.fen);
      selectedSquare = null; legalTargets = [];
      renderBoard();
      updateStatus();
    })
    .subscribe();
}

async function syncOnlineGame(){
  await sb.from('chess_games').update({ fen: game.fen() }).eq('id', onlineGameId);
}
</script>
</body>
</html>
