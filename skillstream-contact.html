<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Paradise Of The Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#141F38; --ink-2:#1F2E52; --gold:#C9A24E; --gold-light:#E4C583;
    --cream:#FBF7EF; --sage:#6B8F71; --charcoal:#2B2B2B; --line:#E9E2D2;
    --shadow-card:0 8px 24px rgba(20,31,56,0.08);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--charcoal); padding-bottom:40px; -webkit-font-smoothing:antialiased;}
  h1,.display{font-family:'Fraunces',serif; letter-spacing:-0.01em;}
  header.top{background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%); color:var(--cream); padding:26px 20px 32px;}
  header.top .eyebrow{font-size:11.5px; letter-spacing:2.2px; text-transform:uppercase; color:var(--gold-light); margin-bottom:6px; font-weight:600;}
  header.top h1{margin:0; font-size:27px; font-weight:600;}
  .wrap{padding:22px 20px; max-width:500px; margin:0 auto;}

  .info-row{display:flex; gap:12px; align-items:flex-start; margin-bottom:16px;}
  .info-row .icon{font-size:20px; width:28px; text-align:center;}
  .info-row .label{font-size:12px; color:#8a8474; margin-bottom:2px;}
  .info-row .value{font-size:14.5px; font-weight:600; color:var(--ink);}
  .info-row a{color:var(--ink); text-decoration:none;}

  .card{background:#fff; border-radius:18px; padding:22px; box-shadow:var(--shadow-card); margin:20px 0;}

  label{display:block; font-size:13px; font-weight:600; color:var(--ink); margin:14px 0 6px;}
  label:first-of-type{margin-top:0;}
  input, textarea{
    width:100%; padding:12px 13px; border:1.5px solid var(--line); border-radius:11px;
    font-size:15px; font-family:'Inter',sans-serif; background:#fdfcfa;
  }
  textarea{min-height:100px; resize:vertical;}
  input:focus, textarea:focus{outline:none; border-color:var(--gold-light);}

  .submit-btn{
    width:100%; background:var(--ink); color:#fff; border:none; padding:14px; border-radius:12px;
    font-size:15.5px; font-weight:700; margin-top:18px; cursor:pointer;
  }
  .submit-btn:disabled{opacity:0.6;}

  .msg{margin-top:14px; padding:11px 13px; border-radius:9px; font-size:13.5px; display:none; line-height:1.4;}
  .msg.error{background:#FBEAE6; color:#B5533C; display:block;}
  .msg.success{background:#EAF0EC; color:var(--sage); display:block;}

  .back-link{display:inline-block; margin-top:6px; font-size:14px; font-weight:600; color:var(--ink); text-decoration:none;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">Learning Never Ends</div>
  <h1>Get In Touch</h1>
</header>

<div class="wrap">
  <div class="info-row">
    <span class="icon">✉️</span>
    <div><div class="label">Email</div><div class="value"><a href="mailto:hello@gshoddow.vercel.app">hello@gshoddow.vercel.app</a></div></div>
  </div>
  <div class="info-row">
    <span class="icon">💬</span>
    <div><div class="label">Response Time</div><div class="value">Usually within 1–2 business days</div></div>
  </div>

  <div class="card">
    <label>Your Name</label>
    <input type="text" id="cName" placeholder="Full name">
    <label>Your Email</label>
    <input type="email" id="cEmail" placeholder="you@example.com">
    <label>Message</label>
    <textarea id="cMessage" placeholder="How can we help?"></textarea>
    <button class="submit-btn" id="submitBtn" onclick="sendMessage()">Send Message</button>
    <div class="msg" id="msg"></div>
  </div>

  <a class="back-link" href="index.html">&larr; Back to Home</a>
</div>

<script>
/* ====================================================================
   CONFIG — REQUIRED — same project as your other SkillStream pages
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showMsg(text, type){
  const m = document.getElementById('msg');
  m.textContent = text; m.className = 'msg ' + type;
}

async function sendMessage(){
  const name = document.getElementById('cName').value.trim();
  const email = document.getElementById('cEmail').value.trim();
  const message = document.getElementById('cMessage').value.trim();

  if(!name || !email || !message){
    showMsg('Please fill in all fields.', 'error');
    return;
  }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  try{
    const { error } = await sb.from('contact_messages').insert({ name, email, message });
    if(error) throw error;
    showMsg("Message sent — we'll get back to you soon.", 'success');
    document.getElementById('cName').value = '';
    document.getElementById('cEmail').value = '';
    document.getElementById('cMessage').value = '';
  } catch(err){
    showMsg('Something went wrong: ' + err.message, 'error');
  } finally{
    btn.disabled = false;
    btn.textContent = 'Send Message';
  }
}
</script>

</body>
</html>
