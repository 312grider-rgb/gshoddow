<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>SkillStream — My Account</title>
<meta name="description" content="Manage your SkillStream profile, skills, and session history."/>
<meta name="theme-color" content="#7B6FFF"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%237B6FFF'/><text y='.9em' font-size='80' x='10'>🎓</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+Arabic:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
html[lang="ar"] body{font-family:'Noto Sans Arabic','Inter',sans-serif}
.lang-switcher{position:relative}
.lang-btn{display:flex;align-items:center;gap:5px;background:var(--pill);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer}
.lang-btn:hover{border-color:var(--accent)}
.lang-dropdown{position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-width:150px;box-shadow:var(--shadow);display:none;z-index:999;overflow:hidden}
html[dir="rtl"] .lang-dropdown{right:auto;left:0}
.lang-dropdown.open{display:block}
.lang-option{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;font-size:12px;font-weight:500;border:none;background:none;color:var(--text);width:100%;text-align:left;transition:all .15s}
html[dir="rtl"] .lang-option{text-align:right}
.lang-option:hover{background:rgba(123,111,255,.08);color:var(--accent)}
.lang-option.active{color:var(--accent);font-weight:700}
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#07080C;--surface:#0F1118;--card:#161920;--border:#1E2130;
--accent:#7B6FFF;--accent-dark:#5A4FD8;--live:#FF3D5A;--green:#00E5A0;
--yellow:#FFB930;--blue:#4B9EFF;--text:#ECEDF5;--muted:#5A5E75;
--pill:#1A1D28;--glass:rgba(15,17,24,0.92);--shadow:0 8px 40px rgba(0,0,0,0.7);
--radius:14px;--radius-sm:8px;--radius-full:9999px
}
html,body{min-height:100%;background:var(--bg);font-family:'Inter',sans-serif;font-size:14px;color:var(--text)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--radius-full)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:var(--glass);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:22px;color:var(--text);text-decoration:none}
.logo span{background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:8px;align-items:center}
.nav-btn{background:var(--pill);border:1px solid var(--border);color:var(--muted);border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s}
.nav-btn:hover{border-color:var(--accent);color:var(--text)}
.nav-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.nav-btn.danger{background:rgba(255,61,90,.08);border-color:rgba(255,61,90,.2);color:var(--live)}
.nav-btn.danger:hover{background:var(--live);color:#fff}
.page{max-width:700px;margin:0 auto;padding:32px 20px 60px}
.profile-hero{display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 24px 32px;background:linear-gradient(160deg,#14103a 0%,#0a0c18 100%);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:24px;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(123,111,255,.12) 0%,transparent 70%);pointer-events:none}
.avatar-wrap{position:relative;cursor:pointer}
.avatar-img{width:96px;height:96px;border-radius:50%;object-fit:cover;border:3px solid var(--accent);background:var(--card);display:block}
.avatar-placeholder{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:#fff;border:3px solid rgba(123,111,255,.4);flex-shrink:0}
.avatar-edit{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:12px}
.hero-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;text-align:center}
.hero-role{display:inline-flex;align-items:center;gap:6px;background:rgba(123,111,255,.12);border:1px solid rgba(123,111,255,.25);border-radius:var(--radius-full);padding:5px 14px;font-size:12px;font-weight:700;color:var(--accent)}
.hero-contact{font-size:13px;color:var(--muted);text-align:center}
.hero-bio{font-size:13px;color:var(--muted);text-align:center;max-width:400px;line-height:1.6;font-style:italic}
.hero-stats{display:flex;gap:24px;margin-top:4px}
.stat{text-align:center}
.stat .val{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--text)}
.stat .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.section-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.section-body{padding:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row.full{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
input[type=text],input[type=tel],input[type=email],textarea,select{
background:var(--card);border:1px solid var(--border);color:var(--text);
border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;
outline:none;transition:all .2s;font-family:'Inter',sans-serif;width:100%
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(123,111,255,.1)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
select option{background:var(--card)}
.role-toggle{display:flex;background:var(--card);border-radius:var(--radius-sm);padding:4px;gap:4px;border:1px solid var(--border)}
.role-opt{flex:1;padding:10px;text-align:center;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .2s;font-family:'Inter',sans-serif}
.role-opt.active{background:var(--accent);color:#fff}
.tags-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.tag{display:flex;align-items:center;gap:6px;background:rgba(123,111,255,.1);border:1px solid rgba(123,111,255,.2);color:var(--accent);border-radius:var(--radius-full);padding:5px 12px;font-size:12px;font-weight:600}
.tag .remove{cursor:pointer;opacity:.6;font-size:14px;line-height:1}
.tag .remove:hover{opacity:1}
.tag-input-row{display:flex;gap:8px;margin-top:10px}
.tag-input-row input{flex:1}
.add-tag-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--radius-sm);padding:0 16px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.save-bar{display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border);margin-top:16px}
.btn{padding:11px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;border:none;transition:all .25s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark);transform:scale(1.02)}
.btn-ghost{background:var(--pill);color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--green);color:#000;border-radius:var(--radius-full);padding:12px 28px;font-weight:800;font-size:14px;z-index:300;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--live);color:#fff}
.danger-zone{border-color:rgba(255,61,90,.2)}
.danger-zone .section-header{border-color:rgba(255,61,90,.15);background:rgba(255,61,90,.03)}
.danger-zone .section-title{color:var(--live)}
.session-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.session-item:last-child{border-bottom:none}
.session-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0}
.session-info{flex:1}
.session-name{font-size:13px;font-weight:600}
.session-meta{font-size:11px;color:var(--muted);margin-top:2px}
.session-dur{font-size:12px;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700}
@media(max-width:600px){
.form-row{grid-template-columns:1fr}
.hero-stats{gap:16px}
.topbar{padding:0 16px}
.page{padding:20px 14px 60px}
}
</style>
</head>
<body>
<div class="topbar">
<a class="logo" href="skillstream-dashboard.html">Skill<span>Stream</span></a>
<div class="nav-links">
<a class="nav-btn" href="skillstream-classroom.html" id="spJoinBtn">🎥 Join Session</a>
<div class="lang-switcher" id="spLangSwitcher">
<button class="lang-btn" onclick="toggleSPLang()">🌐 <span id="spLangName">EN</span> ▾</button>
<div class="lang-dropdown" id="spLangDropdown">
<button class="lang-option" onclick="setSPLang('en')">🇬🇧 English</button>
<button class="lang-option" onclick="setSPLang('ar')">🇸🇦 العربية</button>
<button class="lang-option" onclick="setSPLang('fr')">🇫🇷 Français</button>
<button class="lang-option" onclick="setSPLang('es')">🇪🇸 Español</button>
<button class="lang-option" onclick="setSPLang('zh')">🇨🇳 中文</button>
</div>
</div>
<button class="nav-btn danger" onclick="signOut()" id="spSignOutBtn">Sign Out</button>
</div>
</div>
<div class="page" id="page">
<div class="profile-hero" id="profileHero">
<div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()" title="Change photo">
<div class="avatar-placeholder" id="avatarPlaceholder">?</div>
<img class="avatar-img" id="avatarImg" src="" alt="Avatar" style="display:none"/>
<div class="avatar-edit">✏️</div>
</div>
<input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatar(this)"/>
<div class="hero-name" id="heroName">Your Name</div>
<div class="hero-role" id="heroRole">👤 Student</div>
<div class="hero-contact" id="heroContact"></div>
<div class="hero-bio" id="heroBio" style="display:none"></div>
<div class="hero-stats">
<div class="stat"><div class="val" id="statSessions">0</div><div class="lbl">Sessions</div></div>
<div class="stat"><div class="val" id="statHours">0h</div><div class="lbl">Hours</div></div>
<div class="stat"><div class="val" id="statSkills">0</div><div class="lbl">Skills</div></div>
</div>
</div>
