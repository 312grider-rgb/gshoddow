<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Paradise Of The Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#141F38; --ink-2:#1F2E52; --gold:#C9A24E; --gold-light:#E4C583; --cream:#FBF7EF; --sage:#6B8F71;
    --charcoal:#2B2B2B; --line:#E9E2D2; --danger:#B5533C;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--charcoal); padding-bottom:60px;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  button, a, .btn, .course-card, .chip{ transition:transform 0.18s cubic-bezier(.22,1,.36,1), box-shadow 0.18s cubic-bezier(.22,1,.36,1); }
  button:active, a.btn:active, .btn:active, .course-card:active{ transform:scale(0.97); }

  header.top{background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%); color:var(--cream); padding:22px 18px 60px; position:relative;}
  header.top .eyebrow{font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:4px; font-weight:700;}
  header.top h1{margin:0; font-size:25px;}

  .wrap{padding:0 18px;}

  .avatar-card{
    background:#fff; border-radius:18px; padding:20px;
    margin-top:-42px; box-shadow:0 6px 18px rgba(27,42,74,0.08);
    text-align:center; margin-bottom:22px;
  }
  .avatar{
    width:78px; height:78px; border-radius:50%; background:var(--gold);
    display:flex; align-items:center; justify-content:center; margin:0 auto 12px;
    font-family:'Fraunces',serif; font-size:28px; font-weight:700; color:var(--ink);
    overflow:hidden; border:3px solid #fff; box-shadow:0 0 0 3px var(--line);
  }
  .avatar img{width:100%; height:100%; object-fit:cover;}
  .name{font-size:19px; font-weight:700; color:var(--ink);}
  .role-badge{
    display:inline-block; margin-top:6px; font-size:11px; font-weight:700;
    letter-spacing:0.5px; text-transform:uppercase; padding:4px 12px; border-radius:20px;
  }
  .role-badge.student{background:#EAF0EC; color:var(--sage);}
  .role-badge.teacher{background:#F5EAD6; color:var(--gold);}
  .bio-text{font-size:13.5px; color:#666; margin-top:10px; line-height:1.5;}

  .stats-row{display:flex; gap:10px; margin-bottom:22px;}
  .stat{flex:1; background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 8px; text-align:center;}
  .stat .val{font-family:'Fraunces',serif; font-size:22px; font-weight:700; color:var(--ink);}
  .stat .lbl{font-size:11px; color:#777; margin-top:2px;}

  .badge-grid{
    display:flex; flex-wrap:wrap; gap:10px; margin-bottom:22px;
  }
  .achievement-badge{
    display:flex; flex-direction:column; align-items:center; gap:4px;
    background:#fff; border-radius:14px; padding:12px 10px; width:78px; text-align:center;
    box-shadow:0 2px 10px rgba(20,31,56,0.06);
  }
  .achievement-badge.locked{opacity:0.35;}
  .achievement-badge .icon{font-size:24px;}
  .achievement-badge .label{font-size:10px; font-weight:600; color:var(--ink); line-height:1.2;}

  .section-title{
    font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold);
    font-weight:700; margin-bottom:12px;
  }
  .card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:20px;}

  label{display:block; font-size:13px; font-weight:600; margin:14px 0 6px; color:var(--ink);}
  label:first-child{margin-top:0;}
  input, textarea{
    width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:9px;
    font-size:15px; font-family:'Inter',sans-serif; background:#fdfcfa;
  }
  textarea{min-height:80px; resize:vertical;}

  .btn{
    display:block; width:100%; text-align:center; background:var(--ink); color:#fff;
    border:none; padding:13px 18px; border-radius:10px; font-size:15px; font-weight:700;
    cursor:pointer; margin-top:16px;
  }
  .btn.outline{background:transparent; color:var(--danger); border:1.5px solid var(--danger);}

  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:11px 18px; border-radius:30px;
    font-size:14px; z-index:100; display:none;
  }
  .loading{text-align:center; padding:30px; color:#888;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">Learning Never Ends</div>
  <h1>My Profile</h1>
</header>

<div class="wrap">
  <div class="avatar-card" id="avatarCard"><div class="loading">Loading profile…</div></div>

  <div class="stats-row" id="statsRow"></div>

  <div class="section-title" id="achievementsTitle" style="display:none;">Achievements</div>
  <div class="badge-grid" id="achievementsGrid"></div>

  <div class="section-title">Edit Profile</div>
  <div class="card">
    <label>Full Name</label>
    <input type="text" id="fullName" placeholder="Your name">
    <label>Bio</label>
    <textarea id="bio" placeholder="A short line about you — your interests, what you teach or want to learn"></textarea>
    <label>Avatar Image URL</label>
    <input type="text" id="avatarUrl" placeholder="https://...">
    <button class="btn" onclick="saveProfile()">Save Changes</button>
  </div>

  <div class="section-title">Account</div>
  <div class="card">
    <button class="btn outline" onclick="signOut()">Log Out</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====================================================================
   CONFIG — REQUIRED — same project as your other SkillStream pages
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let currentProfile = null;

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 2200);
}
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){ window.location.href = 'skillstream-login.html'; return; }
  currentUser = session.user;
  loadProfile();

  sb.auth.onAuthStateChange((event, session)=>{
    if(!session){ window.location.href = 'skillstream-login.html'; }
  });
}

async function loadProfile(){
  const { data: profile, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).maybeSingle();
  if(error){
    document.getElementById('avatarCard').innerHTML = `<div class="loading">Couldn't load profile.<br><small>${error.message}</small></div>`;
    return;
  }
  currentProfile = profile || { id: currentUser.id, full_name: currentUser.email, role: 'student' };
  renderProfile();
  loadStats();

  document.getElementById('fullName').value = currentProfile.full_name || '';
  document.getElementById('bio').value = currentProfile.bio || '';
  document.getElementById('avatarUrl').value = currentProfile.avatar_url || '';
}

function renderProfile(){
  const initials = (currentProfile.full_name || currentUser.email || '?').trim().charAt(0).toUpperCase();
  const role = currentProfile.role || 'student';
  document.getElementById('avatarCard').innerHTML = `
    <div class="avatar">
      ${currentProfile.avatar_url ? `<img src="${currentProfile.avatar_url}">` : initials}
    </div>
    <div class="name">${escapeHtml(currentProfile.full_name || currentUser.email)}</div>
    <span class="role-badge ${role}">${role === 'teacher' ? 'Teacher' : 'Student'}</span>
    ${currentProfile.bio ? `<div class="bio-text">${escapeHtml(currentProfile.bio)}</div>` : ''}
  `;
}

async function loadStats(){
  const role = currentProfile.role || 'student';
  const statsEl = document.getElementById('statsRow');

  if(role === 'teacher'){
    const { data: courses } = await sb.from('courses').select('id, is_published').eq('teacher_id', currentUser.id);
    const total = (courses || []).length;
    const published = (courses || []).filter(c => c.is_published).length;
    statsEl.innerHTML = `
      <div class="stat"><div class="val">${total}</div><div class="lbl">Courses</div></div>
      <div class="stat"><div class="val">${published}</div><div class="lbl">Published</div></div>
    `;
  } else {
    const [{ data: progress }, { data: certs }] = await Promise.all([
      sb.from('lesson_progress').select('lesson_id, completed').eq('user_id', currentUser.id).eq('completed', true),
      sb.from('certificates').select('id').eq('user_id', currentUser.id)
    ]);
    const lessonsDone = (progress||[]).length;
    const certsEarned = (certs||[]).length;
    statsEl.innerHTML = `
      <div class="stat"><div class="val">${lessonsDone}</div><div class="lbl">Lessons Done</div></div>
      <div class="stat"><div class="val">${certsEarned}</div><div class="lbl">Certificates</div></div>
    `;
    renderAchievements(lessonsDone, certsEarned);
  }
}

function renderAchievements(lessonsDone, certsEarned){
  const badges = [
    { icon: '🌱', label: 'First Lesson', unlocked: lessonsDone >= 1 },
    { icon: '📚', label: '10 Lessons', unlocked: lessonsDone >= 10 },
    { icon: '🔥', label: '25 Lessons', unlocked: lessonsDone >= 25 },
    { icon: '🏅', label: 'First Certificate', unlocked: certsEarned >= 1 },
    { icon: '🎓', label: '3 Certificates', unlocked: certsEarned >= 3 },
    { icon: '👑', label: '5 Certificates', unlocked: certsEarned >= 5 }
  ];

  const anyUnlocked = badges.some(b => b.unlocked);
  document.getElementById('achievementsTitle').style.display = anyUnlocked ? 'block' : 'none';

  document.getElementById('achievementsGrid').innerHTML = badges.map(b => `
    <div class="achievement-badge ${b.unlocked ? '' : 'locked'}">
      <div class="icon">${b.icon}</div>
      <div class="label">${b.label}</div>
    </div>
  `).join('');
}

async function saveProfile(){
  const payload = {
    id: currentUser.id,
    full_name: document.getElementById('fullName').value.trim(),
    bio: document.getElementById('bio').value.trim(),
    avatar_url: document.getElementById('avatarUrl').value.trim(),
    role: currentProfile.role || 'student'
  };
  const { error } = await sb.from('profiles').upsert(payload, { onConflict: 'id' });
  if(error){ toast('Error: ' + error.message); return; }
  currentProfile = { ...currentProfile, ...payload };
  renderProfile();
  toast('Profile updated');
}

async function signOut(){
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

initAuth();
</script>
</body>
</html>
