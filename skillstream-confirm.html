<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirming... — Paradise Of The Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --ink:#1B2A4A; --gold:#C99A44; --cream:#FBF8F2; --danger:#B5533C; }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    font-family:'Inter',sans-serif; background:var(--ink); color:#fff; text-align:center; padding:24px;
  }
  .box{max-width:340px;}
  h1{font-family:'Fraunces',serif; font-size:22px; margin:0 0 10px;}
  p{font-size:14.5px; opacity:0.85; line-height:1.5; margin:0 0 18px;}
  .spinner{
    width:34px; height:34px; border:3px solid rgba(255,255,255,0.25); border-top-color:var(--gold);
    border-radius:50%; margin:0 auto 20px; animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  a.btn{
    display:inline-block; background:var(--gold); color:var(--ink); padding:12px 22px;
    border-radius:10px; font-weight:700; text-decoration:none; font-size:14.5px;
  }
  .error-icon{font-size:32px; margin-bottom:12px;}
</style>
</head>
<body>
  <div class="box" id="content">
    <div class="spinner"></div>
    <h1>Confirming your email...</h1>
    <p>Just a moment while we log you in.</p>
  </div>

<script>
/* ====================================================================
   CONFIG — REQUIRED — same project as your other SkillStream pages
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showError(msg){
  document.getElementById('content').innerHTML = `
    <div class="error-icon">⚠️</div>
    <h1>Confirmation link problem</h1>
    <p>${msg}</p>
    <a class="btn" href="skillstream-login.html">Go to Login</a>
  `;
}

function showSuccess(){
  document.getElementById('content').innerHTML = `
    <div class="error-icon">✅</div>
    <h1>Email confirmed!</h1>
    <p>Taking you to your dashboard...</p>
  `;
  setTimeout(async ()=>{
    const { data: { session } } = await sb.auth.getSession();
    let destination = 'skillstream-dashboard.html';
    if(session){
      const { data: profile } = await sb.from('profiles').select('role').eq('id', session.user.id).maybeSingle();
      if(profile?.role === 'teacher') destination = 'skillstream-courses.html';
    }
    window.location.href = destination;
  }, 1200);
}

async function handleConfirmation(){
  // Newer Supabase auth (PKCE): link has ?code=...
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if(code){
    const { error } = await sb.auth.exchangeCodeForSession(code);
    if(error){ showError(error.message); return; }
    showSuccess();
    return;
  }

  // Older Supabase auth (implicit flow): tokens arrive in the URL hash
  // (#access_token=...&type=signup...). supabase-js parses this
  // automatically on client creation (detectSessionInUrl is on by
  // default), so by the time we get here the session should exist.
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    showSuccess();
    return;
  }

  showError('This link may have expired or already been used. Try logging in directly, or request a new confirmation email.');
}

handleConfirmation();
</script>
</body>
</html>
