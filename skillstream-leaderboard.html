<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — Paradise Of The Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#141F38; --ink-2:#1F2E52; --gold:#C9A24E; --gold-light:#E4C583;
    --cream:#FBF7EF; --sage:#6B8F71; --charcoal:#2B2B2B; --line:#E9E2D2;
    --shadow-soft:0 2px 10px rgba(20,31,56,0.06);
    --shadow-card:0 8px 24px rgba(20,31,56,0.08);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--charcoal); padding-bottom:40px; -webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',serif; letter-spacing:-0.01em;}
  button, a{transition:transform 0.18s var(--ease);}
  button:active, a:active{transform:scale(0.97);}

  header.top{background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%); color:var(--cream); padding:26px 20px 30px;}
  header.top .eyebrow{font-size:11.5px; letter-spacing:2.2px; text-transform:uppercase; color:var(--gold-light); margin-bottom:6px; font-weight:600;}
  header.top h1{margin:0; font-size:26px; font-weight:600;}
  header.top p{margin:8px 0 0; font-size:14px; opacity:0.8;}

  .wrap{padding:20px;}
  .tabs{display:flex; gap:8px; margin-bottom:18px;}
  .tab-btn{
    flex:1; background:#fff; border:none; padding:11px 8px; border-radius:12px;
    font-size:13px; font-weight:700; color:var(--ink); cursor:pointer; box-shadow:var(--shadow-soft);
  }
  .tab-btn.active{background:var(--ink); color:var(--gold-light); box-shadow:var(--shadow-card);}

  .row{
    display:flex; align-items:center; gap:14px;
    background:#fff; border-radius:16px; padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow-soft);
  }
  .row.top1{box-shadow:0 10px 26px rgba(201,162,78,0.3); border:1.5px solid var(--gold-light);}
  .rank{
    width:34px; height:34px; border-radius:50%; background:var(--cream);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:var(--ink);
    flex:0 0 34px;
  }
  .row.top1 .rank{background:var(--gold); color:#fff;}
  .row.top2 .rank{background:#D9D2C2; color:var(--ink);}
  .row.top3 .rank{background:#E6BE8A; color:var(--ink);}
  .avatar{
    width:40px; height:40px; border-radius:50%; background:var(--gold-light);
    display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--ink);
    flex:0 0 40px; overflow:hidden; font-family:'Fraunces',serif;
  }
  .avatar img{width:100%; height:100%; object-fit:cover;}
  .info{flex:1; min-width:0;}
  .info .name{font-weight:600; font-size:14.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .info .role{font-size:11.5px; color:#a8a094;}
  .score{font-weight:700; font-size:16px; color:var(--gold); font-family:'Fraunces',serif;}
  .score .unit{font-size:10.5px; color:#a8a094; font-weight:500; font-family:'Inter',sans-serif; display:block;}

  .empty{text-align:center; padding:50px 20px; color:#a8a094;}
  .loading{text-align:center; padding:30px; color:#a8a094;}
  .back-link{display:inline-block; margin-top:14px; font-size:14px; font-weight:600; color:var(--ink); text-decoration:none;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">Learning Never Ends</div>
  <h1>Leaderboard</h1>
  <p>See who's leading the way this month.</p>
</header>

<div class="wrap">
  <div class="tabs">
    <button class="tab-btn active" id="tabLessonsBtn" onclick="switchBoard('lessons')">Lessons Completed</button>
    <button class="tab-btn" id="tabCertsBtn" onclick="switchBoard('certs')">Certificates</button>
  </div>

  <div id="boardList"><div class="loading">Loading leaderboard…</div></div>

  <a class="back-link" href="skillstream-dashboard.html">&larr; Back to Dashboard</a>
</div>

<script>
/* ====================================================================
   CONFIG — REQUIRED — same project as your other SkillStream pages
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentBoard = 'lessons';

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function switchBoard(board){
  currentBoard = board;
  document.getElementById('tabLessonsBtn').classList.toggle('active', board === 'lessons');
  document.getElementById('tabCertsBtn').classList.toggle('active', board === 'certs');
  loadBoard();
}

async function loadBoard(){
  const el = document.getElementById('boardList');
  el.innerHTML = '<div class="loading">Loading leaderboard…</div>';

  const column = currentBoard === 'lessons' ? 'lessons_completed_count' : 'certificates_count';

  const { data, error } = await sb
    .from('profiles')
    .select('id, full_name, avatar_url, role, lessons_completed_count, certificates_count')
    .eq('role', 'student')
    .gt(column, 0)
    .order(column, { ascending:false })
    .limit(50);

  if(error){
    el.innerHTML = `<div class="empty">Couldn't load leaderboard.<br><small>${error.message}</small></div>`;
    return;
  }

  if(!data || data.length === 0){
    el.innerHTML = `<div class="empty">No one has ${currentBoard === 'lessons' ? 'completed a lesson' : 'earned a certificate'} yet — be the first!</div>`;
    return;
  }

  el.innerHTML = data.map((u, i) => {
    const rank = i + 1;
    const score = currentBoard === 'lessons' ? (u.lessons_completed_count || 0) : (u.certificates_count || 0);
    const unit = currentBoard === 'lessons' ? 'lessons' : 'certs';
    const initials = (u.full_name || '?').trim().charAt(0).toUpperCase();
    const topClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
    return `
    <div class="row ${topClass}">
      <div class="rank">${rank}</div>
      <div class="avatar">${u.avatar_url ? `<img src="${u.avatar_url}">` : initials}</div>
      <div class="info">
        <div class="name">${escapeHtml(u.full_name || 'Learner')}</div>
        <div class="role">Student</div>
      </div>
      <div class="score">${score}<span class="unit">${unit}</span></div>
    </div>`;
  }).join('');
}

loadBoard();
</script>
</body>
</html>
