<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — Paradise Of The Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141F38; --ink-2:#1F2E52; --gold:#C9A24E; --gold-light:#E4C583;
    --cream:#FBF7EF; --charcoal:#2B2B2B; --line:#E9E2D2;
    --shadow-soft:0 2px 10px rgba(20,31,56,0.06);
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--cream); color:var(--charcoal); padding-bottom:40px; -webkit-font-smoothing:antialiased;}
  h1,.display{font-family:'Fraunces',serif; letter-spacing:-0.01em;}
  header.top{background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%); color:var(--cream); padding:26px 20px 32px;}
  header.top .eyebrow{font-size:11.5px; letter-spacing:2.2px; text-transform:uppercase; color:var(--gold-light); margin-bottom:6px; font-weight:600;}
  header.top h1{margin:0; font-size:27px; font-weight:600;}
  .wrap{padding:22px 20px; max-width:600px; margin:0 auto;}

  .faq-item{background:#fff; border-radius:14px; margin-bottom:10px; box-shadow:var(--shadow-soft); overflow:hidden;}
  .faq-q{
    width:100%; text-align:left; background:none; border:none; padding:16px 18px;
    font-size:15px; font-weight:600; color:var(--ink); display:flex; justify-content:space-between;
    align-items:center; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .faq-q .chevron{transition:transform 0.2s ease; color:var(--gold); font-size:14px;}
  .faq-item.open .faq-q .chevron{transform:rotate(180deg);}
  .faq-a{
    max-height:0; overflow:hidden; transition:max-height 0.25s ease;
    padding:0 18px; font-size:14px; color:#5c5648; line-height:1.6;
  }
  .faq-item.open .faq-a{max-height:300px; padding-bottom:16px;}
  .back-link{display:inline-block; margin-top:20px; font-size:14px; font-weight:600; color:var(--ink); text-decoration:none;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">Learning Never Ends</div>
  <h1>Frequently Asked Questions</h1>
</header>

<div class="wrap" id="faqList"></div>

<div class="wrap" style="padding-top:0;">
  <a class="back-link" href="index.html">&larr; Back to Home</a>
</div>

<script>
const faqs = [
  {
    q: "Is Paradise Of The Eternal Learners free to use?",
    a: "Yes — self-paced courses, the AI Tutor, and your dashboard are free to use. Some future features, like premium live classes or advanced AI tools, may be part of an optional paid plan down the line."
  },
  {
    q: "Do I need to be a student to join?",
    a: "No. Anyone can join to learn, and anyone can apply to teach. There's no age limit or academic requirement to sign up as a learner."
  },
  {
    q: "How do I become a teacher on the platform?",
    a: "During signup, choose 'Teach' instead of 'Learn.' That gives you access to the course builder, where you can create courses, add video lessons, and publish them for students to find."
  },
  {
    q: "Do I get a certificate when I finish a course?",
    a: "Yes — once you complete every lesson in a self-paced course, a certificate is automatically issued and appears on your dashboard and profile."
  },
  {
    q: "What is the AI Tutor?",
    a: "The AI Tutor can explain a lesson in simpler terms, generate a short quiz to test your understanding, summarize key takeaways, or answer specific questions you have about what you're learning."
  },
  {
    q: "Are the academic courses (KG through University) accredited?",
    a: "Not currently — academic-level courses are organized by grade level for structure and clarity, but they are supplementary learning resources rather than accredited coursework."
  },
  {
    q: "How do I reset my password?",
    a: "On the login page, tap 'Forgot password?' and enter your email. You'll receive a reset link shortly after."
  },
  {
    q: "How do I contact support?",
    a: "Visit the Contact page linked in the footer, or reach out directly using the email address listed there."
  }
];

function toggleFaq(i){
  document.querySelectorAll('.faq-item')[i].classList.toggle('open');
}

document.getElementById('faqList').innerHTML = faqs.map((f, i) => `
  <div class="faq-item">
    <button class="faq-q" onclick="toggleFaq(${i})">
      <span>${f.q}</span>
      <span class="chevron">▾</span>
    </button>
    <div class="faq-a">${f.a}</div>
  </div>
`).join('');
</script>

</body>
</html>
