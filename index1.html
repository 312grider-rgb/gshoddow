<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkillStream - Live Classroom</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#07080C;--surface:#0F1118;--card:#161920;--border:#1E2130;--accent:#7B6FFF;--accent-dark:#5A4FD8;--live:#FF3D5A;--green:#00E5A0;--yellow:#FFB930;--blue:#4B9EFF;--text:#ECEDF5;--muted:#5A5E75;--pill:#1A1D28;--glass:rgba(15,17,24,0.92);--shadow:0 8px 40px rgba(0,0,0,0.7);--radius:14px;--radius-sm:8px;--radius-full:9999px}
        html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI','Inter',sans-serif;font-size:14px;color:var(--text)}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:var(--radius-full)}
        .app{display:none;flex-direction:column;height:100vh;width:100vw}
        .app.active{display:flex}
        .hidden{display:none!important}

        /* JOIN SCREEN */
        .join-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 40%,#14103a 0%,#050608 100%);z-index:1000;padding:20px}
        .join-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px;max-width:440px;width:100%;box-shadow:var(--shadow);animation:slideUp .5s cubic-bezier(.34,1.56,.64,1)}
        @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
        .join-card .logo{font-size:28px;font-weight:900;text-align:center;margin-bottom:4px}
        .join-card .logo span{background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .join-card .subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px}
        .join-card .form-group{margin-bottom:16px}
        .join-card label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
        .join-card input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:12px 16px;font-size:15px;outline:none;transition:all .2s}
        .join-card input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(123,111,255,.1)}
        .join-card .btn-join{width:100%;background:var(--accent);border:none;color:#fff;border-radius:var(--radius-sm);padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:all .25s;margin-top:8px}
        .join-card .btn-join:hover{background:var(--accent-dark);transform:scale(1.02)}
        .join-card .divider{display:flex;align-items:center;gap:16px;margin:20px 0;color:var(--muted);font-size:12px}
        .join-card .divider::before,.join-card .divider::after{content:'';flex:1;height:1px;background:var(--border)}
        .join-card .quick-join{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
        .join-card .quick-join button{background:var(--pill);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-full);padding:6px 16px;font-size:12px;cursor:pointer;transition:all .2s}
        .join-card .quick-join button:hover{border-color:var(--accent);background:rgba(123,111,255,.08)}
        .cam-preview-box{margin-top:16px;border-radius:var(--radius);overflow:hidden;background:#000;border:1px solid var(--border);position:relative;height:120px;display:flex;align-items:center;justify-content:center}
        .cam-preview-box video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
        .cam-preview-box .cam-label{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;white-space:nowrap}
        .join-card .error{color:var(--live);font-size:13px;margin-top:8px;display:none}

        /* TOPBAR */
        .topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:60px;background:var(--glass);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0;z-index:100}
        .logo{font-weight:900;font-size:20px;color:var(--text);flex-shrink:0}
        .logo span{background:linear-gradient(135deg,var(--accent),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .session-pill{display:flex;align-items:center;gap:10px;background:var(--pill);border:1px solid var(--border);border-radius:var(--radius-full);padding:6px 16px 6px 10px;min-width:0;flex:1;max-width:440px}
        .live-badge{display:flex;align-items:center;gap:6px;background:var(--live);color:#fff;border-radius:var(--radius-full);padding:4px 12px;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
        .live-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse-dot 1.2s infinite}
        @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
        .session-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .timer-pill{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.15);color:var(--green);border-radius:var(--radius-full);padding:5px 16px;font-weight:700;font-size:14px;flex-shrink:0}
        .btn-leave{background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.2);color:var(--live);border-radius:var(--radius-sm);padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;transition:all .25s}
        .btn-leave:hover{background:var(--live);color:#fff}

        /* MAIN */
        .main{display:flex;flex:1;min-height:0;overflow:hidden}
        .stage{flex:1;display:flex;flex-direction:column;min-width:0;background:#050608}
        .presenter{flex:1;position:relative;min-height:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 30% 40%,#14103a 0%,#050608 70%)}
        .video-grid{display:grid;width:100%;height:100%;padding:12px;gap:10px;transition:all .4s}
        .video-grid.mode-speaker{grid-template-columns:1fr;grid-template-rows:1fr}
        .video-grid.mode-grid-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr}
        .video-grid.mode-grid-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}

        .video-tile{border-radius:var(--radius);overflow:hidden;position:relative;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:0;transition:all .3s;cursor:pointer}
        .video-tile:hover{border-color:rgba(123,111,255,.4)}
        .video-tile.speaking{border-color:var(--green);box-shadow:0 0 30px rgba(0,229,160,.15)}
        .video-tile video{width:100%;height:100%;object-fit:cover;background:#0a0c14}
        .tile-footer{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 100%);display:flex;align-items:center;justify-content:space-between}
        .tile-name{font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px}
        .tile-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;background:rgba(0,0,0,.6)}
        .tile-top{position:absolute;top:10px;left:10px;right:10px;display:flex;align-items:center;justify-content:space-between;pointer-events:none}
        .speaking-wave{display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.6);border-radius:var(--radius-full);padding:4px 10px}
        .speaking-wave span{width:3px;background:var(--green);border-radius:2px;animation:wave 1s ease-in-out infinite}
        .speaking-wave span:nth-child(2){animation-delay:.15s}
        .speaking-wave span:nth-child(3){animation-delay:.3s}
        @keyframes wave{0%,100%{height:4px}50%{height:16px}}

        .self-view{position:absolute;bottom:14px;right:14px;width:120px;height:88px;border-radius:var(--radius);background:#000;border:2.5px solid var(--accent);overflow:hidden;cursor:pointer;z-index:20;box-shadow:var(--shadow)}
        .self-view video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;transform:scaleX(-1)}
        .self-view .overlay{position:absolute;bottom:0;left:0;right:0;z-index:2;display:flex;flex-direction:column;align-items:center;padding:3px 6px;background:linear-gradient(to top,rgba(0,0,0,.8),transparent)}
        .self-view .overlay .name{font-size:9px;font-weight:700;color:#fff}
        .self-view .overlay .status{font-size:8px;color:rgba(255,255,255,.6)}

        /* CONTROLS */
        .controls{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;gap:12px;flex-wrap:wrap}
        .ctrl-group{display:flex;gap:8px;align-items:center}
        .ctrl-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:56px;height:52px;border-radius:var(--radius);background:var(--pill);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all .2s;font-size:18px;position:relative}
        .ctrl-btn .lbl{font-size:9px;color:var(--muted);font-weight:500;margin-top:2px}
        .ctrl-btn:hover{border-color:var(--accent);background:rgba(123,111,255,.08);transform:translateY(-2px)}
        .ctrl-btn.on{background:rgba(123,111,255,.15);border-color:var(--accent);color:var(--accent)}
        .ctrl-btn.on .lbl{color:var(--accent)}
        .ctrl-btn.off{background:rgba(255,61,90,.08);border-color:rgba(255,61,90,.25)}
        .ctrl-btn.off .lbl{color:var(--live)}
        .ctrl-btn.danger{background:rgba(255,61,90,.08);border-color:rgba(255,61,90,.25);color:var(--live)}
        .ctrl-btn.danger:hover{background:var(--live);color:#fff}

        .reaction-bar{display:flex;gap:4px;align-items:center;background:var(--pill);border:1px solid var(--border);border-radius:var(--radius-full);padding:4px 10px}
        .react-btn{width:32px;height:32px;border-radius:50%;border:none;background:none;font-size:18px;cursor:pointer;transition:all .15s}
        .react-btn:hover{transform:scale(1.4)}

        /* SIDEBAR */
        .sidebar{width:320px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);transition:transform .35s}
        .sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
        .stab{flex-shrink:0;padding:14px 10px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap}
        .stab:hover{color:var(--text)}
        .stab.active{color:var(--text);border-bottom-color:var(--accent)}
        .spanel{display:none;flex-direction:column;flex:1;min-height:0;background:var(--bg)}
        .spanel.active{display:flex}

        .chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
        .msg{display:flex;gap:10px;animation:msgIn .2s ease-out}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
        .msg-head{display:flex;align-items:center;gap:8px;margin-bottom:2px}
        .msg-name{font-size:12px;font-weight:700}
        .msg-time{font-size:10px;color:var(--muted)}
        .msg-text{font-size:13px;line-height:1.5;word-break:break-word}
        .msg.system{justify-content:center}
        .msg.system .msg-text{font-size:12px;color:var(--muted);font-style:italic;background:var(--pill);border-radius:var(--radius-full);padding:4px 14px}
        .chat-input-row{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;background:var(--surface)}
        .chat-inp{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;outline:none;transition:all .2s}
        .chat-inp:focus{border-color:var(--accent)}
        .send-btn{background:var(--accent);border:none;color:#fff;border-radius:var(--radius-sm);width:40px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

        .plist{flex:1;overflow-y:auto;padding:8px}
        .plist-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);transition:all .15s;cursor:pointer}
        .plist-item:hover{background:var(--pill)}
        .plist-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
        .plist-name{font-size:13px;font-weight:600;flex:1}

        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;border-radius:var(--radius-full);padding:10px 24px;font-weight:700;font-size:13px;z-index:300;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        .mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:140}
        .mob-sidebar-btn{display:none;position:fixed;bottom:80px;right:16px;width:50px;height:50px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:20px;cursor:pointer;z-index:150;box-shadow:0 4px 24px rgba(123,111,255,.5);align-items:center;justify-content:center}

        @media(max-width:768px){
            .sidebar{position:fixed;right:0;top:0;bottom:0;z-index:145;transform:translateX(100%);width:300px;max-width:85vw;box-shadow:var(--shadow)}
            .sidebar.open{transform:translateX(0)}
            .mob-sidebar-btn{display:flex}
            .mob-overlay.open{display:block}
            .self-view{width:80px;height:60px}
            .controls{padding:8px 12px;gap:6px}
            .ctrl-btn{width:44px;height:40px;font-size:15px}
            .ctrl-btn .lbl{font-size:8px}
            .reaction-bar{display:none}
        }
        .ai-msg{display:flex;gap:8px;padding:6px 0}
        .ai-msg-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--blue));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
        .ai-msg-bubble{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;line-height:1.5;flex:1}
        .ai-msg.user{flex-direction:row-reverse}
        .ai-msg.user .ai-msg-bubble{background:rgba(123,111,255,.12)}
        .ai-msg.user .ai-msg-av{background:var(--green);color:#000}
    </style>
</head>
<body>

<!-- JOIN SCREEN -->
<div class="join-screen" id="joinScreen">
    <div class="join-card">
        <div class="logo">Skill<span>Stream</span></div>
        <div class="subtitle">Join or create a session</div>
        <div class="cam-preview-box" id="previewBox">
            <video id="previewVideo" autoplay muted playsinline></video>
            <div class="cam-label">📷 Camera preview</div>
        </div>
        <div class="form-group" style="margin-top:14px">
            <label>👤 Your Name</label>
            <input type="text" id="userNameInput" placeholder="Enter your name..." value="You"/>
        </div>
        <div class="form-group">
            <label>📚 Session Name</label>
            <input type="text" id="sessionNameInput" placeholder="e.g., React Workshop" value="Live Class"/>
        </div>
        <div class="form-group">
            <label>🔑 Room Code</label>
            <input type="text" id="roomCodeInput" placeholder="Leave blank to create" value=""/>
        </div>
        <button class="btn-join" onclick="joinSession()">🚀 Join / Create Room</button>
        <div class="error" id="joinError"></div>
        <div class="divider">or quick join</div>
        <div class="quick-join">
            <button onclick="quickJoin('React Workshop','react123')">⚛️ React</button>
            <button onclick="quickJoin('Python 101','python101')">🐍 Python</button>
            <button onclick="quickJoin('UX Design','uxdesign')">🎨 Design</button>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div class="app" id="app">
    <div class="topbar">
        <div class="logo">Skill<span>Stream</span></div>
        <div class="session-pill">
            <div class="live-badge">LIVE</div>
            <div class="session-name" id="sessionName">Loading...</div>
        </div>
        <div class="timer-pill" id="timer">00:00</div>
        <button class="btn-leave" onclick="leaveSession()">Leave</button>
    </div>

    <div class="main">
        <div class="stage">
            <div class="presenter">
                <div class="video-grid mode-speaker" id="videoGrid"></div>
                
                <div class="self-view" id="selfView">
                    <video id="selfVideo" autoplay muted playsinline></video>
                    <div class="overlay">
                        <div class="name" id="selfViewName">You</div>
                        <div class="status" id="selfViewSub">🎙️ Live</div>
                    </div>
                </div>

                <div id="reactionsFloat" style="position:absolute;left:20px;bottom:100px;display:flex;flex-direction:column;gap:4px;pointer-events:none;z-index:30"></div>
            </div>

            <div class="controls">
                <div class="ctrl-group">
                    <button class="ctrl-btn on" id="micBtn" onclick="toggleMic()">
                        <span id="micIco">🎙️</span><span class="lbl" id="micLbl">Mute</span>
                    </button>
                    <button class="ctrl-btn on" id="camBtn" onclick="toggleCam()">
                        <span id="camIco">📷</span><span class="lbl" id="camLbl">Camera</span>
                    </button>
                </div>

                <div class="reaction-bar">
                    <button class="react-btn" onclick="sendReaction('👏')">👏</button>
                    <button class="react-btn" onclick="sendReaction('❤️')">❤️</button>
                    <button class="react-btn" onclick="sendReaction('😂')">😂</button>
                    <button class="react-btn" onclick="sendReaction('🔥')">🔥</button>
                    <button class="react-btn" onclick="sendReaction('🚀')">🚀</button>
                </div>

                <div class="ctrl-group">
                    <button class="ctrl-btn danger" onclick="leaveSession()"><span>📴</span><span class="lbl">Leave</span></button>
                </div>
            </div>
        </div>

        <div class="sidebar" id="sidebar">
            <div class="sidebar-tabs">
                <button class="stab active" data-tab="chat" onclick="openTab('chat')">💬 Chat</button>
                <button class="stab" data-tab="participants" onclick="openTab('participants')">👥 People</button>
                <button class="stab" data-tab="ai" onclick="openTab('ai')">🤖 AI</button>
            </div>

            <div class="spanel active" id="panel-chat">
                <div class="chat-msgs" id="chatMsgs"></div>
                <div class="chat-input-row">
                    <input class="chat-inp" id="chatInp" placeholder="Type a message… (Enter)" onkeydown="if(event.key==='Enter')sendChat()"/>
                    <button class="send-btn" onclick="sendChat()">➤</button>
                </div>
            </div>

            <div class="spanel" id="panel-participants">
                <div style="padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600" id="participantCount">1 in session</div>
                <div class="plist" id="plist"></div>
            </div>

            <div class="spanel" id="panel-ai">
                <div style="padding:12px 14px;border-bottom:1px solid var(--border);font-weight:700;flex-shrink:0">🤖 AI Assistant</div>
                <div class="chat-msgs" id="aiChatMsgs">
                    <div class="ai-msg">
                        <div class="ai-msg-av">🤖</div>
                        <div class="ai-msg-bubble">Hi! I'm your AI teacher. Ask me anything about your lesson!</div>
                    </div>
                </div>
                <div class="chat-input-row">
                    <input class="chat-inp" id="aiChatInp" placeholder="Ask AI anything…" onkeydown="if(event.key==='Enter')sendAIMessage()"/>
                    <button class="send-btn" onclick="sendAIMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>

    <div class="mob-overlay" id="mobOverlay" onclick="closeMob()"></div>
    <button class="mob-sidebar-btn" onclick="openMob()">💬</button>
    <div class="toast" id="toast"></div>
</div>

<script>
// ============================
// SKILLSTREAM - STANDALONE
// ============================

const $ = id => document.getElementById(id);
const toastEl = $('toast');

let peer = null, myStream = null, myPeerId = null;
let roomCode = '', sessionName = '', userName = '';
let connections = {};
let chatLog = [];
let timerSeconds = 0, timerInterval = null;

// ============================
// JOIN SESSION
// ============================

async function joinSession() {
    userName = $('userNameInput').value.trim() || 'You';
    sessionName = $('sessionNameInput').value.trim() || 'Live Class';
    let room = $('roomCodeInput').value.trim();
    if (!room) {
        room = Math.random().toString(36).substring(2, 8).toUpperCase();
        $('roomCodeInput').value = room;
    }
    roomCode = room;

    $('joinScreen').style.display = 'none';
    $('app').classList.add('active');
    $('sessionName').textContent = sessionName;
    $('selfViewName').textContent = userName;

    // Get camera
    try {
        myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        $('selfVideo').srcObject = myStream;
        await $('selfVideo').play().catch(() => {});
        buildGrid();
    } catch (e) {
        showToast('⚠️ Camera denied - check permissions');
        console.error(e);
    }

    // Timer
    timerInterval = setInterval(() => {
        timerSeconds++;
        const m = String(Math.floor(timerSeconds/60)).padStart(2,'0');
        const s = String(timerSeconds%60).padStart(2,'0');
        $('timer').textContent = `${m}:${s}`;
    }, 1000);

    // PeerJS
    peer = new Peer(undefined, {
        debug: 0,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => {
        myPeerId = id;
        showToast(`🎯 Joined ${sessionName}`);
        updateParticipants();
        addSystemMessage(`🎉 Session started! Room: ${roomCode}`);
        
        // Auto-join if room code exists
        const roomKey = `skillstream_room_${roomCode}`;
        let peers = JSON.parse(localStorage.getItem(roomKey) || '[]');
        if (!peers.includes(id)) {
            peers.push(id);
            localStorage.setItem(roomKey, JSON.stringify(peers));
        }
        peers.forEach(pid => { if (pid !== id) connectToPeer(pid); });

        // Broadcast channel for same device
        try {
            const channel = new BroadcastChannel('skillstream');
            channel.onmessage = (e) => {
                if (e.data.type === 'new-peer' && e.data.room === roomCode && e.data.peerId !== id) {
                    connectToPeer(e.data.peerId);
                }
            };
            channel.postMessage({ type: 'new-peer', room: roomCode, peerId: id });
        } catch(e) {}

        peer.on('connection', conn => {
            conn.on('open', () => {
                connections[conn.peer] = { conn, stream: null };
                setupDataChannel(conn);
                conn.send({ type: 'request-stream' });
                updateParticipants();
                addSystemMessage(`👋 Someone joined`);
            });
        });

        peer.on('call', call => {
            call.answer(myStream);
            call.on('stream', remoteStream => {
                if (!connections[call.peer]) connections[call.peer] = { conn: null, stream: remoteStream };
                else connections[call.peer].stream = remoteStream;
                buildGrid();
            });
        });
    });

    peer.on('error', err => {
        console.error(err);
        $('joinError').textContent = 'Connection error: ' + err.type;
        $('joinError').style.display = 'block';
    });
}

function connectToPeer(peerId) {
    if (peerId === myPeerId || connections[peerId]) return;
    const conn = peer.connect(peerId);
    conn.on('open', () => {
        connections[peerId] = { conn, stream: null };
        setupDataChannel(conn);
        conn.send({ type: 'request-stream' });
        const call = peer.call(peerId, myStream);
        call.on('stream', remoteStream => {
            if (connections[peerId]) connections[peerId].stream = remoteStream;
            buildGrid();
        });
        updateParticipants();
    });
}

function setupDataChannel(conn) {
    conn.on('data', data => handleData(conn.peer, data));
}

function handleData(fromPeer, data) {
    if (data.type === 'chat') {
        chatLog.push(data);
        renderChat();
    } else if (data.type === 'reaction') {
        sendReaction(data.emoji, true);
    } else if (data.type === 'request-stream') {
        if (myStream) {
            const call = peer.call(fromPeer, myStream);
            call.on('stream', remoteStream => {
                if (connections[fromPeer]) connections[fromPeer].stream = remoteStream;
                buildGrid();
            });
        }
    }
}

function broadcast(data) {
    Object.keys(connections).forEach(id => {
        const c = connections[id];
        if (c && c.conn && c.conn.open) c.conn.send(data);
    });
}

// ============================
// VIDEO GRID
// ============================

function buildGrid() {
    const peers = Object.keys(connections).filter(id => connections[id].stream);
    
    if (peers.length === 0 && myStream) {
        videoGrid.innerHTML = `
            <div class="video-tile speaking">
                <video id="selfGridVideo" autoplay muted playsinline style="width:100%;height:100%;object-fit:cover;transform:scaleX(-1)"></video>
                <div class="tile-footer">
                    <div class="tile-name"><div class="tile-icon">🎙</div>${userName} (you)</div>
                </div>
                <div class="tile-top"><div class="speaking-wave"><span></span><span></span><span></span></div></div>
            </div>`;
        const sgv = document.getElementById('selfGridVideo');
        if (sgv) { sgv.srcObject = myStream; sgv.play().catch(()=>{}); }
        return;
    }

    let visible = peers.map(id => ({
        id,
        name: 'Peer',
        stream: connections[id].stream
    }));

    videoGrid.innerHTML = visible.map((p, idx) => `
        <div class="video-tile ${idx === 0 ? 'speaking' : ''}">
            <video id="vid-${p.id}" autoplay playsinline style="width:100%;height:100%;object-fit:cover"></video>
            <div class="tile-footer">
                <div class="tile-name"><div class="tile-icon">🎙</div>${p.name}</div>
            </div>
            ${idx === 0 ? `<div class="tile-top"><div class="speaking-wave"><span></span><span></span><span></span></div></div>` : ''}
        </div>
    `).join('');

    visible.forEach(p => {
        const vid = document.getElementById('vid-'+p.id);
        if (vid && p.stream) { vid.srcObject = p.stream; vid.play().catch(()=>{}); }
    });
}

// ============================
// MEDIA CONTROLS
// ============================

function toggleMic() {
    if (!myStream) return;
    const tracks = myStream.getAudioTracks();
    if (tracks.length > 0) {
        const enabled = !tracks[0].enabled;
        tracks[0].enabled = enabled;
        $('micIco').textContent = enabled ? '🎙️' : '🔇';
        $('micLbl').textContent = enabled ? 'Mute' : 'Unmute';
        $('micBtn').className = 'ctrl-btn ' + (enabled ? 'on' : 'off');
        showToast(enabled ? '🎙️ Mic on' : '🔇 Mic off');
    }
}

function toggleCam() {
    if (!myStream) return;
    const tracks = myStream.getVideoTracks();
    if (tracks.length > 0) {
        const enabled = !tracks[0].enabled;
        tracks[0].enabled = enabled;
        $('camIco').textContent = enabled ? '📷' : '🚫';
        $('camLbl').textContent = enabled ? 'Camera' : 'Show';
        $('camBtn').className = 'ctrl-btn ' + (enabled ? 'on' : 'off');
        $('selfVideo').style.opacity = enabled ? '1' : '0';
        showToast(enabled ? '📷 Camera on' : '📷 Camera off');
    }
}

// ============================
// CHAT
// ============================

function sendChat() {
    const inp = $('chatInp');
    const text = inp.value.trim();
    if (!text) return;
    const time = getTime();
    const msg = { name: userName, init: userName.charAt(0).toUpperCase(), color: '#7B6FFF', text, time, system: false };
    chatLog.push(msg);
    renderChat();
    broadcast({ type: 'chat', ...msg });
    inp.value = '';
}

function addSystemMessage(text) {
    chatLog.push({ system: true, text });
    renderChat();
}

function renderChat() {
    $('chatMsgs').innerHTML = chatLog.map(m => {
        if (m.system) return `<div class="msg system"><div class="msg-text">${m.text}</div></div>`;
        return `<div class="msg"><div class="msg-av" style="background:${m.color}">${m.init}</div><div><div class="msg-head"><span class="msg-name" style="color:${m.color}">${m.name}</span><span class="msg-time">${m.time}</span></div><div class="msg-text">${m.text}</div></div></div>`;
    }).join('');
    $('chatMsgs').scrollTop = $('chatMsgs').scrollHeight;
}

function getTime() {
    return `${String(Math.floor(timerSeconds/60)).padStart(2,'0')}:${String(timerSeconds%60).padStart(2,'0')}`;
}

// ============================
// REACTIONS
// ============================

function sendReaction(emoji, fromRemote = false) {
    const el = document.createElement('div');
    el.textContent = emoji;
    el.style.cssText = `font-size:28px;position:absolute;bottom:0;left:${20+Math.random()*60}px;animation:floatUp 2.8s ease-out forwards;pointer-events:none`;
    $('reactionsFloat').appendChild(el);
    setTimeout(() => el.remove(), 2800);
    if (!fromRemote) broadcast({ type: 'reaction', emoji });
}

// ============================
// PARTICIPANTS
// ============================

function updateParticipants() {
    const peers = Object.keys(connections);
    const items = peers.map(id => ({ id, name: 'Peer', init: 'P', color: '#7B6FFF' }));
    const all = [{ id: myPeerId, name: userName, init: userName.charAt(0).toUpperCase(), color: '#00E5A0', me: true }, ...items];
    $('plist').innerHTML = all.map(p => `
        <div class="plist-item">
            <div class="plist-av" style="background:${p.color}">${p.init}</div>
            <div class="plist-name">${p.name}${p.me ? ' (you)' : ''}</div>
        </div>
    `).join('');
    $('participantCount').textContent = `${all.length} in session`;
}

// ============================
// AI ASSISTANT
// ============================

async function sendAIMessage() {
    const inp = $('aiChatInp');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';

    // Add user message
    const msgs = $('aiChatMsgs');
    const userDiv = document.createElement('div');
    userDiv.className = 'ai-msg user';
    userDiv.innerHTML = `<div class="ai-msg-av">${userName.charAt(0).toUpperCase()}</div><div class="ai-msg-bubble">${text}</div>`;
    msgs.appendChild(userDiv);
    msgs.scrollTop = msgs.scrollHeight;

    // Show typing
    const typingDiv = document.createElement('div');
    typingDiv.className = 'ai-msg';
    typingDiv.id = 'ai-typing';
    typingDiv.innerHTML = `<div class="ai-msg-av">🤖</div><div class="ai-msg-bubble" style="color:var(--muted)">⏳ Thinking...</div>`;
    msgs.appendChild(typingDiv);
    msgs.scrollTop = msgs.scrollHeight;

    // Generate response (mock AI)
    setTimeout(() => {
        document.getElementById('ai-typing')?.remove();
        
        const responses = [
            "That's a great question! Let me explain. The key concept is understanding how the pieces work together.",
            "I think the best way to approach this is to start with the fundamentals and build from there.",
            "Great observation! In practice, this works by applying the principles we've discussed.",
            "Let me break this down: first understand the why, then the how, and finally the what.",
            "Excellent question! This connects directly to what we were discussing earlier."
        ];
        const reply = responses[Math.floor(Math.random() * responses.length)];
        
        const aiDiv = document.createElement('div');
        aiDiv.className = 'ai-msg';
        aiDiv.innerHTML = `<div class="ai-msg-av">🤖</div><div class="ai-msg-bubble">${reply}</div>`;
        msgs.appendChild(aiDiv);
        msgs.scrollTop = msgs.scrollHeight;
    }, 1000 + Math.random() * 1500);
}

// ============================
// UI HELPERS
// ============================

function openTab(name) {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    document.querySelector(`.stab[data-tab="${name}"]`)?.classList.add('active');
    document.querySelectorAll('.spanel').forEach(p => p.classList.remove('active'));
    const panel = $('panel-' + name);
    if (panel) panel.classList.add('active');
    if (window.innerWidth <= 768) { $('sidebar').classList.add('open'); $('mobOverlay').classList.add('open'); }
}

function openMob() { $('sidebar').classList.add('open'); $('mobOverlay').classList.add('open'); }
function closeMob() { $('sidebar').classList.remove('open'); $('mobOverlay').classList.remove('open'); }

function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

function quickJoin(session, room) {
    $('sessionNameInput').value = session;
    $('roomCodeInput').value = room;
    joinSession();
}

function leaveSession() {
    if (!confirm('Leave session?')) return;
    if (peer) peer.destroy();
    if (myStream) myStream.getTracks().forEach(t => t.stop());
    clearInterval(timerInterval);
    window.location.reload();
}
