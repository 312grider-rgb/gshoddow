<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paradise of Eternal Learners — Reset Password</title>
<meta name="theme-color" content="#7B6FFF"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080C;--surface:#0F1118;--card:#161920;--border:#1E2130;--accent:#7B6FFF;--accent-dark:#5A4FD8;--live:#FF3D5A;--green:#00E5A0;--text:#ECEDF5;--muted:#5A5E75;--radius:14px;--radius-sm:8px}
html,body{min-height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:400px}
.logo{font-family:'Syne',sans-serif;font-weight:900;font-size:18px;text-align:center;margin-bottom:6px;display:block;text-decoration:none;color:var(--text)}
.logo span{background:linear-gradient(135deg,var(--accent),#4B9EFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
h1{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;text-align:center;margin-bottom:8px}
.sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;margin-top:14px}
input{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif}
input:focus{outline:none;border-color:var(--accent)}
.btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;margin-top:20px;transition:all .2s}
.btn:hover{background:var(--accent-dark)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{background:rgba(255,61,90,.08);border:1px solid rgba(255,61,90,.2);color:var(--live);border-radius:var(--radius-sm);padding:9px 11px;font-size:12px;margin-top:14px;display:none}
.success-msg{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);color:var(--green);border-radius:var(--radius-sm);padding:9px 11px;font-size:12px;margin-top:14px;display:none;line-height:1.5}
.switch-link{text-align:center;font-size:13px;color:var(--muted);margin-top:18px}
.switch-link a{color:var(--accent);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="index.html">Paradise of <span>Eternal Learners</span></a>
  <h1>Reset your password</h1>
  <div class="sub">Enter your email and we'll send you a link to set a new password.</div>

  <label>Email</label>
  <input type="email" id="email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doReset()"/>

  <button class="btn" id="resetBtn" onclick="doReset()">Send Reset Link</button>
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="switch-link"><a href="skillstream-login.html">← Back to log in</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="skillstream-auth.js"></script>
<script>
async function doReset() {
  const email = document.getElementById('email').value.trim();
  const err = document.getElementById('errorMsg');
  const success = document.getElementById('successMsg');
  const btn = document.getElementById('resetBtn');

  err.style.display = 'none';
  success.style.display = 'none';

  if (!email) {
    err.textContent = 'Please enter your email address.';
    err.style.display = 'block';
    return;
  }

  btn.textContent = 'Sending…'; btn.disabled = true;
  const result = await window.SSAuth.requestPasswordReset(email, 'skillstream-reset-password.html');
  btn.textContent = 'Send Reset Link'; btn.disabled = false;

  if (!result.ok) {
    err.textContent = result.error;
    err.style.display = 'block';
    return;
  }

  success.textContent = "✅ If an account exists for that email, a reset link is on its way. Check your inbox (and spam folder).";
  success.style.display = 'block';
}
</script>
</body>
</html>
