<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>SkillStream — Live Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080C;--surface:#0F1118;--card:#161920;--border:#1E2130;
  --accent:#7B6FFF;--live:#FF3D5A;--green:#00E5A0;--yellow:#FFB930;
  --blue:#4B9EFF;--text:#ECEDF5;--muted:#5A5E75;--pill:#1A1D28;
  --glass:rgba(22,25,32,0.85);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;display:flex;flex-direction:column}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:0 16px;height:52px;
  background:var(--glass);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
  flex-shrink:0;z-index:100;
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--text);text-decoration:none;flex-shrink:0}
.logo span{color:var(--accent)}
.session-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--pill);border:1px solid var(--border);
  border-radius:30px;padding:5px 12px 5px 8px;
  min-width:0;flex:1;
}
.live-badge{
  display:flex;align-items:center;gap:4px;
  background:var(--live);color:#fff;
  border-radius:20px;padding:2px 8px;
  font-size:10px;font-weight:800;letter-spacing:.06em;flex-shrink:0;
}
.live-badge::before{content:'';width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.session-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.timer-pill{
  background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);
  color:var(--green);border-radius:20px;padding:4px 11px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:700;flex-shrink:0;
}
.btn-leave{
  background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.3);
  color:var(--live);border-radius:8px;padding:6px 12px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;
  flex-shrink:0;transition:all .2s;
}
.btn-leave:hover{background:var(--live);color:#fff}

/* ── MAIN LAYOUT ── */
.main{display:flex;flex:1;min-height:0;overflow:hidden}

/* ── VIDEO STAGE ── */
.stage{flex:1;display:flex;flex-direction:column;min-width:0;position:relative;background:#050608}

/* PRESENTER */
.presenter{
  flex:1;position:relative;min-height:0;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 40%,#1a1045 0%,#050608 70%);
}

/* VIDEO GRID MODES */
.video-grid{
  display:grid;width:100%;height:100%;padding:8px;gap:6px;
  transition:all .3s;
}
.video-grid.mode-speaker{grid-template-columns:1fr;grid-template-rows:1fr}
.video-grid.mode-grid-2{grid-template-columns:1fr 1fr;grid-template-rows:1fr}
.video-grid.mode-grid-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.video-grid.mode-grid-6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}

.video-tile{
  border-radius:12px;overflow:hidden;position:relative;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  min-height:0;transition:border-color .2s;cursor:pointer;
}
.video-tile:hover{border-color:var(--accent)}
.video-tile.speaking{border-color:var(--green);box-shadow:0 0 0 2px rgba(0,229,160,.2)}
.video-tile.pinned{border-color:var(--accent);box-shadow:0 0 0 2px rgba(123,111,255,.2)}
.video-tile.me{border-color:rgba(75,158,255,.4)}

/* FAKE VIDEO CONTENT */
.tile-bg{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
}
.tile-avatar{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
.tile-avatar.sm{width:36px;height:36px;font-size:14px}
.tile-name-big{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#fff}
.tile-sub{font-size:11px;color:rgba(255,255,255,.4)}

/* TILE OVERLAYS */
.tile-footer{
  position:absolute;bottom:0;left:0;right:0;
  padding:8px 10px;
  background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
}
.tile-name{font-size:11px;font-weight:700;color:#fff;display:flex;align-items:center;gap:5px}
.tile-icons{display:flex;gap:4px}
.tile-icon{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;background:rgba(0,0,0,.5);
}
.tile-icon.muted{background:rgba(255,61,90,.3);color:var(--live)}
.tile-icon.cam-off{background:rgba(255,61,90,.3);color:var(--live)}

.tile-top{
  position:absolute;top:8px;left:8px;right:8px;
  display:flex;align-items:center;justify-content:space-between;
}
.speaking-wave{display:flex;align-items:center;gap:2px}
.speaking-wave span{
  width:2px;background:var(--green);border-radius:1px;
  animation:wave 1s ease-in-out infinite;
}
.speaking-wave span:nth-child(2){animation-delay:.15s}
.speaking-wave span:nth-child(3){animation-delay:.3s}
@keyframes wave{0%,100%{height:3px}50%{height:12px}}

.pin-btn{
  width:22px;height:22px;border-radius:6px;
  background:rgba(0,0,0,.5);border:none;color:rgba(255,255,255,.5);
  font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;
}
.video-tile:hover .pin-btn{opacity:1}
.pin-btn.pinned{opacity:1;color:var(--accent);background:rgba(123,111,255,.2)}

/* SCREEN SHARE OVERLAY */
.screen-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#080d1a,#050a14);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:10;
}
.screen-overlay.active{display:flex}
.screen-mock{
  width:75%;max-width:520px;background:#0d1117;
  border-radius:12px;border:1px solid var(--border);
  aspect-ratio:16/9;display:flex;flex-direction:column;overflow:hidden;
}
.screen-mock-bar{
  background:#161920;padding:8px 12px;display:flex;align-items:center;gap:6px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.screen-dot{width:10px;height:10px;border-radius:50%}
.screen-mock-body{
  flex:1;padding:16px;display:flex;flex-direction:column;gap:8px;
  font-size:11px;font-family:monospace;color:#00E5A0;
}
.code-line{height:10px;border-radius:3px;background:rgba(0,229,160,.08)}
.code-line.accent{background:rgba(123,111,255,.15)}
.screen-label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.screen-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.2s infinite}

/* FLOATING SELF VIEW */
.self-view{
  position:absolute;bottom:12px;right:12px;
  width:110px;height:82px;border-radius:10px;
  background:linear-gradient(135deg,#1a1040,#0e0820);
  border:2px solid var(--accent);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  cursor:pointer;z-index:20;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:transform .2s;
}
.self-view:hover{transform:scale(1.05)}
.self-view-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;font-family:'Syne',sans-serif;color:#000;
}
.self-view-label{font-size:9px;color:rgba(255,255,255,.5)}
.self-view-you{font-size:10px;font-weight:700;color:#fff}

/* REACTIONS FLOAT */
.reactions-float{
  position:absolute;left:16px;bottom:80px;
  display:flex;flex-direction:column;gap:4px;pointer-events:none;z-index:30;
}
.reaction-bubble{
  font-size:22px;animation:floatUp 2.5s ease-out forwards;opacity:0;
}
@keyframes floatUp{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-120px);opacity:0}
}

/* VIEW MODE SWITCHER */
.view-switcher{
  position:absolute;top:12px;left:12px;
  display:flex;gap:4px;z-index:20;
}
.vs-btn{
  background:rgba(0,0,0,.5);border:1px solid var(--border);
  color:var(--muted);border-radius:7px;width:30px;height:28px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;transition:all .2s;backdrop-filter:blur(8px);
}
.vs-btn.active{background:rgba(123,111,255,.2);border-color:var(--accent);color:var(--accent)}

/* HAND RAISE NOTIFICATIONS */
.hand-notification{
  position:absolute;top:12px;right:140px;
  background:var(--pill);border:1px solid var(--accent);
  border-radius:20px;padding:6px 12px;
  font-size:12px;font-weight:600;
  display:none;align-items:center;gap:6px;z-index:20;
  animation:slideIn .3s ease;backdrop-filter:blur(8px);
}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.hand-notification.show{display:flex}

/* CONTROLS BAR */
.controls{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--surface);
  border-top:1px solid var(--border);flex-shrink:0;gap:8px;
}
.ctrl-group{display:flex;gap:6px;align-items:center}
.ctrl-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  width:54px;height:50px;border-radius:12px;
  background:var(--pill);border:1px solid var(--border);
  color:var(--text);cursor:pointer;transition:all .2s;
  font-size:17px;
}
.ctrl-btn .lbl{font-size:9px;color:var(--muted);font-family:'Inter',sans-serif;line-height:1}
.ctrl-btn:hover{border-color:var(--accent);background:rgba(123,111,255,.08)}
.ctrl-btn.on{background:rgba(123,111,255,.12);border-color:var(--accent)}
.ctrl-btn.off{background:rgba(255,61,90,.08);border-color:rgba(255,61,90,.3)}
.ctrl-btn.off .lbl{color:var(--live)}
.ctrl-btn.danger{background:rgba(255,61,90,.1);border-color:rgba(255,61,90,.3);color:var(--live)}
.ctrl-btn.danger:hover{background:var(--live);color:#fff;border-color:var(--live)}

/* REACTION BAR */
.reaction-bar{
  display:flex;gap:4px;align-items:center;
  background:var(--pill);border:1px solid var(--border);
  border-radius:30px;padding:4px 8px;
}
.react-btn{
  width:30px;height:30px;border-radius:50%;border:none;background:none;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .15s;
}
.react-btn:hover{transform:scale(1.3)}

/* ── RIGHT SIDEBAR ── */
.sidebar{
  width:290px;flex-shrink:0;display:flex;flex-direction:column;
  border-left:1px solid var(--border);background:var(--surface);
}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{
  flex:1;padding:12px 6px;text-align:center;font-size:11px;font-weight:700;
  cursor:pointer;color:var(--muted);border:none;background:none;
  border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.02em;
}
.stab.active{color:var(--text);border-bottom-color:var(--accent)}
.spanel{display:none;flex-direction:column;flex:1;min-height:0}
.spanel.active{display:flex}

/* CHAT */
.chat-msgs{
  flex:1;overflow-y:auto;padding:12px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.chat-msgs::-webkit-scrollbar{width:3px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:8px}
.msg-av{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;font-family:'Syne',sans-serif;
  color:#fff;flex-shrink:0;margin-top:1px;
}
.msg-body{}
.msg-head{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.msg-name{font-size:11px;font-weight:700}
.msg-time{font-size:10px;color:var(--muted)}
.msg-text{font-size:13px;line-height:1.45;color:var(--text)}
.msg.me .msg-text{color:rgba(123,111,255,.9)}
.msg.system{justify-content:center}
.msg.system .msg-text{
  font-size:11px;color:var(--muted);font-style:italic;
  background:var(--pill);border-radius:20px;padding:3px 10px;
}
.chat-input-row{
  padding:10px 12px;border-top:1px solid var(--border);
  display:flex;gap:8px;flex-shrink:0;
}
.chat-inp{
  flex:1;background:var(--card);border:1px solid var(--border);
  color:var(--text);border-radius:9px;padding:9px 12px;
  font-family:'Inter',sans-serif;font-size:13px;outline:none;
  transition:border-color .2s;
}
.chat-inp:focus{border-color:var(--accent)}
.chat-inp::placeholder{color:var(--muted)}
.send-btn{
  background:var(--accent);border:none;color:#fff;
  border-radius:9px;width:36px;cursor:pointer;
  font-size:14px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:opacity .2s;
}
.send-btn:hover{opacity:.85}

/* PARTICIPANTS */
.plist{flex:1;overflow-y:auto;padding:10px}
.plist::-webkit-scrollbar{width:3px}
.plist-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:9px;
  transition:background .15s;cursor:pointer;
}
.plist-item:hover{background:var(--pill)}
.plist-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;font-family:'Syne',sans-serif;
  color:#fff;flex-shrink:0;
}
.plist-info{flex:1;min-width:0}
.plist-name{font-size:12px;font-weight:600}
.plist-role{font-size:10px;color:var(--muted)}
.plist-icons{display:flex;gap:5px;color:var(--muted);font-size:12px}
.plist-icons .muted-icon{color:var(--live)}
.plist-hand{color:var(--yellow);font-size:13px}
.p-count-bar{
  padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;
}
.p-count{font-weight:700;color:var(--text)}
.p-muted{color:var(--muted)}
.invite-btn{
  background:none;border:1px solid var(--border);color:var(--accent);
  border-radius:7px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;
  font-family:'Inter',sans-serif;transition:all .2s;
}
.invite-btn:hover{background:rgba(123,111,255,.1)}

/* WHITEBOARD */
.wb-panel{flex:1;display:flex;flex-direction:column;padding:10px;gap:8px}
.wb-tools{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.wb-tool{
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:5px 9px;cursor:pointer;font-size:11px;color:var(--muted);
  transition:all .2s;display:flex;align-items:center;gap:4px;
}
.wb-tool:hover,.wb-tool.active{border-color:var(--accent);color:var(--text);background:rgba(123,111,255,.08)}
.wb-colors{display:flex;gap:4px;margin-left:auto}
.wb-color{
  width:18px;height:18px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s;
}
.wb-color.selected{border-color:#fff}
canvas#wb{
  flex:1;background:#0a0b10;border-radius:10px;
  border:1px solid var(--border);cursor:crosshair;display:block;width:100%;
}

/* RAISE HAND TOAST */
.hand-toast{
  position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--accent);color:#fff;border-radius:20px;
  padding:8px 18px;font-size:12px;font-weight:700;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  z-index:200;white-space:nowrap;opacity:0;pointer-events:none;
}
.hand-toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* MOBILE SIDEBAR TOGGLE */
.mob-sidebar-btn{
  display:none;position:fixed;bottom:80px;right:12px;
  width:44px;height:44px;border-radius:50%;background:var(--accent);
  border:none;color:#fff;font-size:18px;cursor:pointer;z-index:150;
  box-shadow:0 4px 20px rgba(123,111,255,.4);
  align-items:center;justify-content:center;
}
.mob-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:140;
}

@media(max-width:680px){
  .sidebar{
    position:fixed;right:0;top:0;bottom:0;z-index:145;
    transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
    width:280px;
  }
  .sidebar.open{transform:translateX(0)}
  .mob-sidebar-btn{display:flex}
  .mob-overlay.open{display:block}
  .self-view{width:80px;height:60px}
  .self-view-avatar{width:24px;height:24px;font-size:10px}
  .topbar{gap:8px}
  .session-name{max-width:120px}
  .ctrl-btn{width:46px;height:44px;font-size:15px}
  .reaction-bar{display:none}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <a href="skillstream.html" class="logo">Skill<span>Stream</span></a>
  <div class="session-pill">
    <div class="live-badge">LIVE</div>
    <div class="session-name">Build a React App from Scratch</div>
  </div>
  <div class="timer-pill" id="timer">44:32</div>
  <button class="btn-leave" onclick="if(confirm('Leave session?'))window.location='skillstream.html'">Leave</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- STAGE -->
  <div class="stage">

    <!-- VIEW SWITCHER -->
    <div class="view-switcher">
      <button class="vs-btn active" id="vs-speaker" onclick="setView('speaker')" title="Speaker view">⬛</button>
      <button class="vs-btn" id="vs-grid2" onclick="setView('grid2')" title="2-up">⊞</button>
      <button class="vs-btn" id="vs-grid4" onclick="setView('grid4')" title="4-up">⊟</button>
      <button class="vs-btn" id="vs-grid6" onclick="setView('grid6')" title="6-up">⊡</button>
    </div>

    <!-- HAND NOTIFICATION -->
    <div class="hand-notification" id="handNotif">
      <span>✋</span> <span id="handNotifName">Carlos raised hand</span>
      <button style="background:var(--accent);border:none;color:#fff;border-radius:5px;padding:2px 7px;font-size:10px;cursor:pointer;font-weight:700" onclick="dismissHand()">Call on</button>
    </div>

    <!-- VIDEO GRID -->
    <div class="presenter">
      <div class="video-grid mode-speaker" id="videoGrid"></div>

      <!-- SCREEN SHARE -->
      <div class="screen-overlay" id="screenOverlay">
        <div class="screen-mock">
          <div class="screen-mock-bar">
            <div class="screen-dot" style="background:#ff5f57"></div>
            <div class="screen-dot" style="background:#febc2e"></div>
            <div class="screen-dot" style="background:#28c840"></div>
            <span style="font-size:10px;color:var(--muted);margin-left:8px">App.jsx — SkillStream/src</span>
          </div>
          <div class="screen-mock-body">
            <div class="code-line" style="width:60%"></div>
            <div class="code-line accent" style="width:85%"></div>
            <div class="code-line" style="width:40%"></div>
            <div class="code-line accent" style="width:70%"></div>
            <div class="code-line" style="width:55%"></div>
            <div class="code-line" style="width:80%"></div>
            <div class="code-line accent" style="width:45%"></div>
            <div class="code-line" style="width:65%"></div>
          </div>
        </div>
        <div class="screen-label">Amara is sharing her screen</div>
      </div>

      <!-- FLOATING REACTIONS -->
      <div class="reactions-float" id="reactionsFloat"></div>

      <!-- SELF VIEW -->
      <div class="self-view" onclick="toggleSelfView()">
        <div class="self-view-avatar">Y</div>
        <div class="self-view-you">You</div>
        <div class="self-view-label">Camera on</div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <div class="ctrl-group">
        <button class="ctrl-btn" id="micBtn" onclick="toggle('mic')">
          <span id="micIco">🎙️</span><span class="lbl" id="micLbl">Mute</span>
        </button>
        <button class="ctrl-btn" id="camBtn" onclick="toggle('cam')">
