<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SkillStream — Live Classroom</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0F13;--surface:#16181F;--card:#1C1F2A;--border:#2A2D3A;
  --accent:#6C63FF;--live:#FF4D6D;--group:#00C9A7;--text:#E8E9F0;
  --muted:#6B6F82;--pill:#23263A;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:54px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:12px}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text);text-decoration:none}
.logo span{color:var(--accent)}
.session-info{display:flex;align-items:center;gap:10px;min-width:0}
.live-chip{display:flex;align-items:center;gap:5px;background:var(--live);color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.live-chip::before{content:'';width:6px;height:6px;border-radius:50%;background:#fff;animation:p 1.4s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.4}}
.session-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px}
.session-host{font-size:12px;color:var(--muted)}
.topbar-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.timer{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--group);background:rgba(0,201,167,.1);padding:5px 12px;border-radius:20px}
.btn-end{background:var(--live);border:none;color:#fff;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif}
.nav-back{color:var(--muted);font-size:12px;text-decoration:none;display:flex;align-items:center;gap:4px}
.nav-back:hover{color:var(--text)}

/* MAIN */
.main{display:flex;flex:1;min-height:0}

/* VIDEO AREA */
.video-area{flex:1;display:flex;flex-direction:column;min-width:0;background:#0a0b0e;position:relative}

/* PRESENTER */
.presenter{flex:1;position:relative;background:#0a0b0e;display:flex;align-items:center;justify-content:center;min-height:0}
.presenter-video{width:100%;height:100%;object-fit:cover;display:block}
.presenter-fake{width:100%;height:100%;background:linear-gradient(135deg,#1a1040 0%,#0e0a2a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.presenter-avatar{width:80px;height:80px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;font-family:'Syne',sans-serif;border:3px solid rgba(108,99,255,.4)}
.presenter-name{font-family:'Syne',sans-serif;font-weight:700;font-size:18px}
.presenter-label{font-size:12px;color:var(--muted)}
.screen-share-overlay{position:absolute;inset:0;background:linear-gradient(135deg,#0d1a2b,#051428);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.screen-share-overlay.active{display:flex}
.screen-mock{width:70%;max-width:500px;background:#16181F;border-radius:10px;border:1px solid var(--border);aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--muted);font-size:13px}
.screen-mock-icon{font-size:36px}

.presenter-overlay{position:absolute;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);display:flex;align-items:flex-end;justify-content:space-between}
.presenter-tag{display:flex;align-items:center;gap:8px}
.presenter-tag .name-badge{background:rgba(0,0,0,.6);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600}
.hand-raised{background:var(--accent);color:#fff;border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700;display:none}
.hand-raised.show{display:block}
.speaking-wave{display:flex;align-items:center;gap:3px;height:16px}
.speaking-wave span{width:3px;background:var(--group);border-radius:2px;animation:wave 1s infinite ease-in-out}
.speaking-wave span:nth-child(2){animation-delay:.15s}
.speaking-wave span:nth-child(3){animation-delay:.3s}
@keyframes wave{0%,100%{height:4px}50%{height:14px}}

/* PARTICIPANTS STRIP */
.participants-strip{height:110px;display:flex;gap:8px;padding:8px 12px;background:var(--surface);border-top:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.participants-strip::-webkit-scrollbar{height:4px}
.participants-strip::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.participant-tile{flex-shrink:0;width:140px;border-radius:10px;background:var(--card);border:1px solid var(--border);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:border-color .2s}
.participant-tile:hover{border-color:var(--accent)}
.participant-tile.speaking{border-color:var(--group)}
.participant-tile.me{border-color:var(--accent)}
.pt-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;font-family:'Syne',sans-serif;color:#fff}
.pt-name{font-size:11px;font-weight:600;color:var(--text)}
.pt-badges{display:flex;gap:4px;position:absolute;top:6px;right:6px}
.pt-badge{font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--pill)}
.pt-muted{background:rgba(255,77,109,.2);color:var(--live)}

/* CONTROLS BAR */
.controls-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 20px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.ctrl-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:12px;width:58px;height:54px;cursor:pointer;color:var(--text);transition:all .2s;font-size:18px;justify-content:center}
.ctrl-btn span.lbl{font-size:9px;color:var(--muted);font-family:'Inter',sans-serif}
.ctrl-btn:hover{border-color:var(--accent);background:var(--pill)}
.ctrl-btn.active{background:rgba(108,99,255,.15);border-color:var(--accent)}
.ctrl-btn.danger{background:rgba(255,77,109,.1);border-color:var(--live)}
.ctrl-btn.danger:hover{background:rgba(255,77,109,.2)}
.ctrl-btn.off{background:rgba(255,77,109,.1);border-color:var(--live)}

/* SIDEBAR */
.sidebar{width:300px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface)}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;transition:all .2s}
.stab.active{color:var(--text);border-bottom-color:var(--accent)}
.sidebar-panel{display:none;flex-direction:column;flex:1;min-height:0}
.sidebar-panel.active{display:flex}

/* CHAT */
.chat-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;gap:8px;align-items:flex-start}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:'Syne',sans-serif;flex-shrink:0;color:#fff}
.msg-body{}
.msg-header{display:flex;align-items:center;gap:6px;margin-bottom:2px}
.msg-name{font-size:11px;font-weight:700}
.msg-time{font-size:10px;color:var(--muted)}
.msg-text{font-size:13px;line-height:1.4;color:var(--text)}
.msg.system .msg-text{color:var(--muted);font-style:italic;font-size:12px;text-align:center;width:100%}
.chat-input-wrap{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.chat-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--muted)}
.send-btn{background:var(--accent);border:none;color:#fff;border-radius:9px;width:36px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s}
.send-btn:hover{opacity:.85}

/* PARTICIPANTS LIST */
.plist{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.plist::-webkit-scrollbar{width:4px}
.plist-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;background:var(--card);border:1px solid transparent}
.plist-item.host{border-color:rgba(108,99,255,.3)}
.plist-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;font-family:'Syne',sans-serif;color:#fff;flex-shrink:0}
.plist-name{flex:1;font-size:13px;font-weight:500}
.plist-role{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.plist-icons{display:flex;gap:5px;color:var(--muted);font-size:13px}
.plist-icons .muted{color:var(--live)}

/* WHITEBOARD PANEL */
.whiteboard-panel{flex:1;display:flex;flex-direction:column;padding:12px;gap:8px}
.wb-tools{display:flex;gap:6px;flex-wrap:wrap}
.wb-tool{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:12px;color:var(--muted);transition:all .2s}
.wb-tool:hover,.wb-tool.active{border-color:var(--accent);color:var(--text)}
canvas#wb{flex:1;background:#12131a;border-radius:10px;border:1px solid var(--border);cursor:crosshair;display:block;width:100%}

/* HAND RAISE TOAST */
.hand-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:700;font-family:'Syne',sans-serif;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300}
.hand-toast.show{opacity:1}

@media(max-width:700px){
  .sidebar{display:none}
  .session-title{max-width:160px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:14px;min-width:0">
    <a href="skillstream.html" class="nav-back">← Browse</a>
    <div class="session-info">
      <div class="live-chip">Live</div>
      <div>
        <div class="session-title">Build a React App from Scratch</div>
        <div class="session-host">Hosted by Amara K. · 💻 Technology</div>
      </div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="timer" id="timer">42:17</div>
    <button class="btn-end" onclick="confirmEnd()">End session</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- VIDEO AREA -->
  <div class="video-area">

    <!-- PRESENTER -->
    <div class="presenter" id="presenterArea">
      <div class="presenter-fake" id="presenterFake">
        <div class="presenter-avatar">A</div>
        <div class="presenter-name">Amara K.</div>
        <div class="presenter-label">Presenter · Camera on</div>
      </div>

      <div class="screen-share-overlay" id="screenShare">
        <div class="screen-mock">
          <div class="screen-mock-icon">🖥️</div>
          <div>Amara's screen — React project</div>
          <div style="font-size:11px;margin-top:4px;color:var(--muted)">VS Code · src/App.jsx</div>
        </div>
        <div style="font-size:12px;color:var(--muted)">Screen sharing active</div>
      </div>

      <div class="presenter-overlay">
        <div class="presenter-tag">
          <div class="speaking-wave" id="speakWave">
            <span></span><span></span><span></span>
          </div>
          <div class="name-badge">Amara K. · Host</div>
          <div class="hand-raised" id="handRaisedBadge">✋ Hand raised</div>
        </div>
        <div style="display:flex;gap:6px;font-size:11px;color:rgba(255,255,255,.5)">
          <span id="viewerCount">👥 12 watching</span>
        </div>
      </div>
    </div>

    <!-- PARTICIPANTS STRIP -->
    <div class="participants-strip" id="participantStrip"></div>

    <!-- CONTROLS -->
    <div class="controls-bar">
      <button class="ctrl-btn" id="micBtn" onclick="toggle('mic')" title="Mute/unmute">
        <span id="micIcon">🎙️</span><span class="lbl" id="micLbl">Mute</span>
      </button>
      <button class="ctrl-btn" id="camBtn" onclick="toggle('cam')" title="Camera on/off">
        <span id="camIcon">📷</span><span class="lbl" id="camLbl">Camera</span>
      </button>
      <button class="ctrl-btn" id="screenBtn" onclick="toggle('screen')" title="Share screen">
        <span id="screenIcon">🖥️</span><span class="lbl">Share</span>
      </button>
      <button class="ctrl-btn" id="handBtn" onclick="toggle('hand')" title="Raise hand">
        <span id="handIcon">✋</span><span class="lbl">Hand</span>
      </button>
      <button class="ctrl-btn" onclick="openTab('whiteboard')" title="Whiteboard">
        <span>✏️</span><span class="lbl">Board</span>
      </button>
      <button class="ctrl-btn" onclick="openTab('participants')" title="Participants">
        <span>👥</span><span class="lbl" id="pCount">12</span>
      </button>
      <button class="ctrl-btn danger" onclick="confirmEnd()" title="Leave">
        <span>📴</span><span class="lbl">Leave</span>
      </button>
    </div>
  </div>

  <!-- RIGHT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="stab active" id="tab-chat" onclick="openTab('chat')">💬 Chat</button>
      <button class="stab" id="tab-participants" onclick="openTab('participants')">👥 People</button>
      <button class="stab" id="tab-whiteboard" onclick="openTab('whiteboard')">✏️ Board</button>
    </div>

    <!-- CHAT -->
    <div class="sidebar-panel active" id="panel-chat">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-wrap">
        <input class="chat-input" id="chatInput" placeholder="Say something…" onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="send-btn" onclick="sendMsg()">➤</button>
      </div>
    </div>

    <!-- PARTICIPANTS -->
    <div class="sidebar-panel" id="panel-participants">
      <div class="plist" id="plist"></div>
    </div>

    <!-- WHITEBOARD -->
    <div class="sidebar-panel" id="panel-whiteboard">
      <div class="whiteboard-panel">
        <div class="wb-tools">
          <button class="wb-tool active" id="wbt-pen" onclick="setTool('pen')">✏️ Pen</button>
          <button class="wb-tool" id="wbt-erase" onclick="setTool('erase')">🧹 Erase</button>
          <button class="wb-tool" onclick="clearWB()">🗑️ Clear</button>
          <select id="wbColor" style="background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px;font-size:12px;cursor:pointer">
            <option value="#6C63FF">Purple</option>
            <option value="#00C9A7">Green</option>
            <option value="#FF4D6D">Red</option>
            <option value="#FFB830">Yellow</option>
            <option value="#E8E9F0">White</option>
          </select>
        </div>
        <canvas id="wb"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- HAND RAISE TOAST -->
<div class="hand-toast" id="handToast">✋ You raised your hand</div>

<script>
// --- TIMER ---
let seconds = 42*60+17;
setInterval(()=>{
  seconds++;
  const m=Math.floor(seconds/60),s=seconds%60;
  document.getElementById('timer').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
},1000);

// --- TOGGLE CONTROLS ---
const states={mic:true,cam:true,screen:false,hand:false};
function toggle(k){
  states[k]=!states[k];
  if(k==='mic'){
    document.getElementById('micIcon').textContent=states.mic?'🎙️':'🔇';
    document.getElementById('micLbl').textContent=states.mic?'Mute':'Unmute';
    document.getElementById('micBtn').classList.toggle('off',!states.mic);
  }
  if(k==='cam'){
    document.getElementById('camIcon').textContent=states.cam?'📷':'🚫';
    document.getElementById('camLbl').textContent=states.cam?'Camera':'Show cam';
    document.getElementById('camBtn').classList.toggle('off',!states.cam);
  }
  if(k==='screen'){
    document.getElementById('screenShare').classList.toggle('active',states.screen);
    document.getElementById('screenBtn').classList.toggle('active',states.screen);
  }
  if(k==='hand'){
    document.getElementById('handBtn').classList.toggle('active',states.hand);
    document.getElementById('handRaisedBadge').classList.toggle('show',states.hand);
    if(states.hand) showHandToast();
  }
}

function showHandToast(){
  const t=document.getElementById('handToast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// --- TABS ---
function openTab(name){
  ['chat','participants','whiteboard'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
    document.getElementById('panel-'+t).classList.toggle('active',t===name);
  });
  if(name==='whiteboard') setTimeout(initWB,50);
}

// --- PARTICIPANTS DATA ---
const pData=[
  {name:'Amara K.',init:'A',color:'#6C63FF',role:'Host',muted:false,cam:true},
  {name:'You',init:'Y',color:'#00C9A7',role:'Student',muted:false,cam:true,me:true},
  {name:'Carlos V.',init:'C',color:'#FF4D6D',role:'Student',muted:true,cam:false},
  {name:'Nadia R.',init:'N',color:'#FFB830',role:'Student',muted:false,cam:true},
  {name:'Omar F.',init:'O',color:'#5B8FF9',role:'Student',muted:true,cam:true},
  {name:'Lin P.',init:'L',color:'#A78BFA',role:'Student',muted:false,cam:false},
  {name:'Kemi A.',init:'K',color:'#F97316',role:'Student',muted:true,cam:true},
  {name:'Jin W.',init:'J',color:'#22D3EE',role:'Student',muted:false,cam:true},
  {name:'Raj N.',init:'R',color:'#84CC16',role:'Student',muted:true,cam:false},
  {name:'Mia H.',init:'M',color:'#EC4899',role:'Student',muted:false,cam:true},
  {name:'Ben M.',init:'B',color:'#FB923C',role:'Student',muted:true,cam:true},
  {name:'Sara L.',init:'S',color:'#34D399',role:'Student',muted:false,cam:true},
];

// BUILD PARTICIPANT STRIP
function buildStrip(){
  const strip=document.getElementById('participantStrip');
  strip.innerHTML=pData.slice(0,8).map((p,i)=>`
    <div class="participant-tile ${p.me?'me':''} ${i===3?'speaking':''}" title="${p.name}">
      <div class="pt-avatar" style="background:${p.color}">${p.init}</div>
      <div class="pt-name">${p.me?'You':p.name}</div>
      <div class="pt-badges">
        ${p.muted?'<div class="pt-badge pt-muted">🔇</div>':'<div class="pt-badge">🎙️</div>'}
        ${!p.cam?'<div class="pt-badge pt-muted">📷</div>':''}
      </div>
    </div>`).join('');
}
buildStrip();

// BUILD PARTICIPANTS LIST
function buildPList(){
  document.getElementById('plist').innerHTML=pData.map(p=>`
    <div class="plist-item ${p.role==='Host'?'host':''}">
      <div class="plist-avatar" style="background:${p.color}">${p.init}</div>
      <div style="flex:1;min-width:0">
        <div class="plist-name">${p.me?p.name+' (you)':p.name}</div>
        <div class="plist-role">${p.role}</div>
      </div>
      <div class="plist-icons">
        <span class="${p.muted?'muted':''}">${p.muted?'🔇':'🎙️'}</span>
        <span>${p.cam?'📷':'🚫'}</span>
      </div>
    </div>`).join('');
  document.getElementById('pCount').textContent=pData.length;
  document.getElementById('viewerCount').textContent=`👥 ${pData.length} watching`;
}
buildPList();

// --- CHAT ---
const chatData=[
  {name:'Amara K.',init:'A',color:'#6C63FF',text:"Welcome everyone! We'll start with project setup.",time:'42:01'},
  {name:'Carlos V.',init:'C',color:'#FF4D6D',text:'Can you share your screen? 🙏',time:'42:05'},
  {name:'Nadia R.',init:'N',color:'#FFB830',text:'This is so helpful, thank you!',time:'42:09'},
  {name:'Amara K.',init:'A',color:'#6C63FF',text:"Sure! Sharing now — look at the file structure.",time:'42:12'},
  {name:'Omar F.',init:'O',color:'#5B8FF9',text:'What version of React are we using?',time:'42:14'},
  {name:'Amara K.',init:'A',color:'#6C63FF',text:'React 18 with Vite. Super fast. ⚡',time:'42:15'},
];
let chatLog=[...chatData];

function renderChat(){
  const el=document.getElementById('chatMessages');
  el.innerHTML=chatLog.map(m=>{
    if(m.system) return `<div class="msg system"><div class="msg-text">${m.text}</div></div>`;
    return `<div class="msg">
      <div class="msg-avatar" style="background:${m.color}">${m.init}</div>
      <div class="msg-body">
        <div class="msg-header">
          <span class="msg-name" style="color:${m.color}">${m.name}</span>
          <span class="msg-time">${m.time}</span>
        </div>
        <div class="msg-text">${m.text}</div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop=el.scrollHeight;
}
renderChat();

function sendMsg(){

// --- WHITEBOARD ---
let wbTool='pen', drawing=false, lx=0, ly=0;
function initWB(){
  const c=document.getElementById('wb');
  if(!c || c._init) return;
  c._init=true;
  const resize=()=>{c.width=c.offsetWidth;c.height=c.offsetHeight};
  resize();
  const ctx=c.getContext('2d');
  ctx.lineCap='round';
  ctx.lineWidth=3;
  c.addEventListener('mousedown',e=>{drawing=true;[lx,ly]=pos(e,c)});
  c.addEventListener('mousemove',e=>{
    if(!drawing) return;
    const [x,y]=pos(e,c);
    const col=document.getElementById('wbColor').value;
    ctx.strokeStyle=wbTool==='erase'?'#12131a':col;
    ctx.lineWidth=wbTool==='erase'?24:3;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();
    [lx,ly]=[x,y];
  });
  c.addEventListener('mouseup',()=>drawing=false);
  c.addEventListener('mouseleave',()=>drawing=false);
  // Touch
  c.addEventListener('touchstart',e=>{e.preventDefault();drawing=true;[lx,ly]=pos(e.touches[0],c)});
  c.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(!drawing) return;
    const [x,y]=pos(e.touches[0],c);
    const col=document.getElementById('wbColor').value;
    ctx.strokeStyle=wbTool==='erase'?'#12131a':col;
    ctx.lineWidth=wbTool==='erase'?24:3;
    ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();
    [lx,ly]=[x,y];
  });
  c.addEventListener('touchend',()=>drawing=false);
}
function pos(e,c){
  const r=c.getBoundingClientRect();
  return[e.clientX-r.left,e.clientY-r.top];
}
function setTool(t){
  wbTool=t;
  document.querySelectorAll('[id^=wbt-]').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('wbt-'+t);
  if(el) el.classList.add('active');
}
function clearWB(){
  const c=document.getElementById('wb');
  if(c) c.getContext('2d').clearRect(0,0,c.width,c.height);
}
