<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Paced Learning — Paradise of Eternal Learners</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#141F38;
    --ink-2:#1F2E52;
    --gold:#C9A24E;
    --gold-light:#E4C583;
    --cream:#FBF7EF;
    --sage:#6B8F71;
    --charcoal:#2B2B2B;
    --line:#E9E2D2;
    --shadow-soft:0 2px 10px rgba(20,31,56,0.06);
    --shadow-card:0 8px 24px rgba(20,31,56,0.08);
    --shadow-lift:0 14px 34px rgba(20,31,56,0.14);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--charcoal);
    padding-bottom:40px;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Fraunces',serif; letter-spacing:-0.01em;}
  button, .course-card, .chip, a{ transition:transform 0.18s var(--ease), opacity 0.18s var(--ease), background 0.18s var(--ease), box-shadow 0.18s var(--ease); }
  button:active, .course-card:active, .chip:active{ transform:scale(0.97); }
  header.top{
    background:linear-gradient(160deg, var(--ink) 0%, var(--ink-2) 100%);
    color:var(--cream);
    padding:26px 20px 30px;
  }
  header.top .eyebrow{
    font-size:11.5px; letter-spacing:2.2px; text-transform:uppercase; color:var(--gold-light); margin-bottom:6px; font-weight:600;
  }
  header.top h1{margin:0; font-size:27px; font-weight:600;}
  header.top p{margin:8px 0 0; font-size:14px; opacity:0.8; letter-spacing:0.1px;}
  .wrap{padding:20px;}
  .search-wrap{
    position:relative; margin-bottom:16px;
  }
  .search-wrap input{
    width:100%; padding:14px 16px 14px 42px; border:none;
    border-radius:14px; font-size:15px; font-family:'Inter',sans-serif; background:#fff;
    box-shadow:var(--shadow-soft);
  }
  .search-wrap input:focus{outline:none; box-shadow:0 0 0 2px var(--gold-light), var(--shadow-soft);}
  .search-wrap .icon{
    position:absolute; left:15px; top:50%; transform:translateY(-50%); font-size:15px; color:#a8a094;
  }
  .filters{
    display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px;
  }
  .chip{
    flex:0 0 auto;
    padding:8px 16px;
    border-radius:20px;
    border:none;
    background:#fff;
    box-shadow:var(--shadow-soft);
    font-size:12.5px;
    font-weight:600;
    color:var(--ink);
    cursor:pointer;
    white-space:nowrap;
    letter-spacing:0.2px;
  }
  .chip.active{background:var(--ink); color:var(--gold-light); box-shadow:var(--shadow-card);}
  .grid{display:flex; flex-direction:column; gap:16px;}
  .course-card{
    background:#fff; border:none; border-radius:20px; overflow:hidden; cursor:pointer;
    position:relative; box-shadow:var(--shadow-card);
  }
  .save-btn{
    position:absolute; top:12px; right:12px; z-index:2;
    width:36px; height:36px; border-radius:50%; border:none;
    background:rgba(255,255,255,0.95); font-size:17px; box-shadow:0 2px 8px rgba(0,0,0,0.15);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .save-btn.saved{color:var(--gold);}
  .course-card .thumb{
    height:128px; background:linear-gradient(135deg, var(--ink), var(--ink-2));
    background-size:cover; background-position:center;
    display:flex; align-items:flex-end; padding:12px;
  }
  .course-card .thumb .cat{
    background:rgba(255,255,255,0.95); color:var(--ink); font-size:10.5px; font-weight:700;
    padding:4px 11px; border-radius:20px; text-transform:uppercase; letter-spacing:0.6px;
  }
  .course-card .body{padding:16px;}
  .course-card h3{margin:0 0 5px; font-size:17.5px; font-weight:600;}
  .course-card p{margin:0 0 10px; font-size:13px; color:#7a7568; line-height:1.5;}
  .progress-track{
    height:5px; background:var(--line); border-radius:4px; overflow:hidden; margin-top:8px;
  }
  .progress-fill{height:100%; background:linear-gradient(90deg, var(--sage), #82ab89); border-radius:4px;}
  .progress-label{font-size:11.5px; color:#948f80; margin-top:6px; letter-spacing:0.1px;}
  .empty{text-align:center; padding:70px 24px; color:#948f80;}
  .empty .display{font-size:20px; color:var(--ink); margin-bottom:8px; font-weight:600;}

  /* Detail view */
  #detailView{display:none;}
  .back-btn{
    background:none; border:none; color:var(--gold); font-weight:600; font-size:14px;
    padding:18px 20px 0; cursor:pointer; letter-spacing:0.2px;
  }
  .detail-header{padding:10px 20px 20px;}
  .detail-header h2{margin:8px 0 6px; font-size:24px; font-weight:600;}
  .detail-header p{margin:0; font-size:14px; color:#7a7568; line-height:1.5;}

  /* Trail (signature element): lessons as stepping stones on a learning path */
  .trail{
    padding:0 20px 8px;
    display:flex;
    flex-direction:column;
  }
  .trail-item{
    display:flex;
    gap:14px;
    position:relative;
    padding-bottom:22px;
  }
  .trail-item:last-child{padding-bottom:0;}
  .trail-line{
    position:absolute;
    left:17px;
    top:36px;
    bottom:-4px;
    width:2px;
    background:var(--line);
  }
  .trail-item:last-child .trail-line{display:none;}
  .trail-item.done .trail-line{background:var(--sage);}
  .trail-dot{
    width:36px; height:36px; border-radius:50%;
    background:#fff; border:none; box-shadow:var(--shadow-soft);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; color:#b3ab9a;
    flex:0 0 36px; z-index:1;
  }
  .trail-item.done .trail-dot{background:var(--sage); color:#fff; box-shadow:0 4px 12px rgba(107,143,113,0.35);}
  .trail-item.current .trail-dot{
    color:var(--ink); box-shadow:0 0 0 3px rgba(201,162,78,0.22), var(--shadow-soft);
    animation:pulse-glow 2.2s ease-in-out infinite;
  }
  @keyframes pulse-glow{
    0%,100%{ box-shadow:0 0 0 3px rgba(201,162,78,0.22), var(--shadow-soft); }
    50%{ box-shadow:0 0 0 6px rgba(201,162,78,0.12), var(--shadow-soft); }
  }
  .trail-content{
    background:#fff; border:none; border-radius:14px;
    padding:14px 16px; flex:1; cursor:pointer; box-shadow:var(--shadow-soft);
  }
  .trail-item.current .trail-content{box-shadow:var(--shadow-card);}
  .trail-content h4{margin:0 0 3px; font-size:15px; font-weight:600;}
  .trail-content .meta{font-size:12px; color:#9a927e;}

  .reviews-section{padding:0 20px 34px;}
  .reviews-header{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
  }
  .reviews-header .avg{
    display:flex; align-items:center; gap:8px;
  }
  .reviews-header .avg .stars{color:var(--gold); font-size:16px;}
  .reviews-header .avg .count{font-size:12.5px; color:#948f80;}
  .review-card{
    background:#fff; border:none; border-radius:14px; padding:15px 16px; margin-bottom:10px; box-shadow:var(--shadow-soft);
  }
  .review-card .r-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .review-card .r-name{font-weight:600; font-size:14px; color:var(--ink);}
  .review-card .r-stars{color:var(--gold); font-size:13px;}
  .review-card .r-comment{font-size:13.5px; color:#5c5648; line-height:1.55;}
  .review-card .r-date{font-size:11.5px; color:#a8a094; margin-top:6px;}

  .my-review-form{
    background:#fff; border:none; border-radius:16px; padding:18px; margin-bottom:16px; box-shadow:var(--shadow-card);
  }
  .my-review-form label{font-size:13px; font-weight:600; color:var(--ink); display:block; margin-bottom:8px;}
  .star-picker{display:flex; gap:6px; margin-bottom:12px;}
  .star-picker button{
    background:none; border:none; font-size:27px; color:var(--line); cursor:pointer; padding:0;
  }
  .star-picker button.active{color:var(--gold);}
  .my-review-form textarea{
    width:100%; padding:11px 13px; border:1.5px solid var(--line); border-radius:11px;
    font-size:14px; min-height:70px; resize:vertical; font-family:'Inter',sans-serif; margin-bottom:10px;
  }
  .my-review-form textarea:focus{outline:none; border-color:var(--gold-light);}
  .my-review-form button.submit-btn{
    background:var(--ink); color:#fff; border:none; padding:12px 16px; border-radius:11px;
    font-weight:600; font-size:14px; width:100%; box-shadow:var(--shadow-soft);
  }

  /* Discussion Room */
  .discussion-section{padding:0 20px 40px;}
  .discussion-section .reviews-header{margin-bottom:14px;}
  .comment-form{
    background:#fff; border-radius:16px; padding:16px; margin-bottom:16px; box-shadow:var(--shadow-card);
    display:flex; gap:8px; align-items:flex-end;
  }
  .comment-form textarea{
    flex:1; border:1.5px solid var(--line); border-radius:11px; padding:11px 13px;
    font-size:14px; min-height:44px; max-height:120px; resize:vertical; font-family:'Inter',sans-serif;
  }
  .comment-form textarea:focus{outline:none; border-color:var(--gold-light);}
  .comment-form button{
    background:var(--ink); color:#fff; border:none; padding:12px 16px; border-radius:11px;
    font-weight:600; font-size:13.5px; white-space:nowrap; box-shadow:var(--shadow-soft);
  }
  .comment-card{
    background:#fff; border-radius:14px; padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow-soft);
  }
  .comment-card .c-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;}
  .comment-card .c-name{font-weight:600; font-size:13.5px; color:var(--ink);}
  .comment-card .c-time{font-size:11px; color:#a8a094;}
  .comment-card .c-body{font-size:13.5px; color:#5c5648; line-height:1.55;}

  /* Player */
  .overlay{
    position:fixed; inset:0; background:rgba(20,31,56,0.55);
    display:none; align-items:flex-end; z-index:50; backdrop-filter:blur(2px);
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--cream); width:100%; max-height:94vh; overflow-y:auto;
    border-radius:26px 26px 0 0; padding:0 0 28px; position:relative;
    box-shadow:0 -10px 40px rgba(0,0,0,0.2);
    animation:sheet-up 0.32s var(--ease);
  }
  @keyframes sheet-up{ from{ transform:translateY(24px); opacity:0.6; } to{ transform:translateY(0); opacity:1; } }
  .close-x{
    position:absolute; top:16px; right:18px; background:rgba(0,0,0,0.4); color:#fff;
    border:none; width:32px; height:32px; border-radius:50%; font-size:18px; z-index:2;
  }
  .video-wrap{position:relative; padding-top:56.25%; background:#000;}
  .video-wrap iframe{position:absolute; top:0; left:0; width:100%; height:100%; border:none;}
  .player-body{padding:20px;}
  .player-body h3{margin:0 0 8px; font-size:19px; font-weight:600;}
  .player-body p{font-size:14px; color:#6b6558; line-height:1.6;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--ink); color:#fff; border:none; padding:14px 18px;
    border-radius:13px; font-size:15px; font-weight:600; cursor:pointer; width:100%;
    margin-top:14px; box-shadow:var(--shadow-soft);
  }
  .btn.done{background:var(--sage);}
  .ai-panel{
    margin-top:20px; border-top:1px solid var(--line); padding-top:18px;
  }
  .ai-panel .ai-title{
    font-size:11.5px; letter-spacing:1.6px; text-transform:uppercase; color:var(--gold);
    font-weight:700; margin-bottom:12px;
  }
  .ai-actions{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;}
  .ai-chip{
    background:#F6ECD8; color:var(--ink); border:none; padding:9px 15px;
    border-radius:20px; font-size:13px; font-weight:600; cursor:pointer;
  }
  .ai-chip:disabled{opacity:0.5;}
  .ai-ask-row{display:flex; gap:8px; margin-bottom:12px;}
  .ai-ask-row input{
    flex:1; padding:12px 13px; border:1.5px solid var(--line); border-radius:11px; font-size:14px;
  }
  .ai-ask-row button{
    background:var(--ink); color:#fff; border:none; padding:0 16px; border-radius:11px; font-weight:600;
  }
  .ai-output{
    background:#fff; border:1px solid var(--line); border-radius:14px; padding:15px;
    font-size:14px; line-height:1.65; color:var(--charcoal); white-space:pre-wrap; min-height:20px;
    box-shadow:var(--shadow-soft);
  }
  .ai-output.loading-text{color:#a8a094; font-style:italic;}
  .cert-banner{
    background:linear-gradient(135deg, var(--gold-light), var(--gold));
    color:var(--ink); border-radius:18px; padding:22px; margin:0 20px 20px; text-align:center;
    box-shadow:0 10px 28px rgba(201,162,78,0.35);
  }
  .cert-banner .display{font-size:19px; margin:0 0 4px; font-weight:600;}
  .cert-banner button{
    margin-top:12px; background:var(--ink); color:#fff; border:none; padding:11px 22px;
    border-radius:11px; font-weight:600; font-size:14px; box-shadow:0 4px 14px rgba(20,31,56,0.25);
  }
  .toast{
    position:fixed; top:18px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:30px;
    font-size:14px; z-index:100; display:none; box-shadow:var(--shadow-lift);
  }
  .loading{text-align:center; padding:40px; color:#a8a094;}

  /* Certificate view */
  .cert-sheet-body{padding:26px 22px; text-align:center;}
  .cert-doc{
    border:2px solid var(--gold); border-radius:16px; padding:30px 20px; margin-top:10px;
    background:linear-gradient(180deg, #fffdf8, #fff);
  }
  .cert-doc .eyebrow{font-size:11px; letter-spacing:2.2px; text-transform:uppercase; color:var(--gold); font-weight:700;}
  .cert-doc h2{margin:12px 0; font-size:22px; color:var(--ink); font-weight:600;}
  .cert-doc .name{font-size:21px; font-weight:700; margin:16px 0 6px;}
  .cert-doc .course{font-style:italic; color:#6b6558; margin-bottom:16px;}
  .cert-doc .date{font-size:12px; color:#a8a094;}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">Paradise Of The Eternal Learners</div>
  <h1>Self-Paced Learning</h1>
  <p>Where Learning Never Ends — go at your own pace.</p>
</header>

<div id="browseView">
  <div class="wrap">
    <div class="search-wrap">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search courses..." oninput="onSearchInput()">
    </div>
    <div class="filters" id="levelFilters"></div>
    <div class="filters" id="filters"></div>
    <div class="grid" id="courseGrid"><div class="loading">Loading courses…</div></div>
  </div>
</div>

<div id="detailView">
  <button class="back-btn" onclick="showBrowse()">&larr; All Courses</button>
  <div class="detail-header" id="detailHeader"></div>
  <div id="certBanner"></div>
  <div class="trail" id="trail"></div>
  <div class="reviews-section" id="reviewsSection"></div>
  <div class="discussion-section" id="discussionSection"></div>
</div>

<!-- Lesson Player -->
<div class="overlay" id="playerOverlay">
  <div class="sheet">
    <button class="close-x" onclick="closeModal('playerOverlay')">&times;</button>
    <div class="video-wrap" id="videoWrap"></div>
    <div class="player-body">
      <h3 id="playerTitle"></h3>
      <p id="playerContent"></p>
      <button class="btn" id="completeBtn" onclick="toggleComplete()">Mark as Complete</button>

      <div class="ai-panel">
        <div class="ai-title">AI Tutor</div>
        <div class="ai-actions">
          <button class="ai-chip" onclick="askAI('explain')">Explain This Lesson</button>
          <button class="ai-chip" onclick="askAI('quiz')">Quiz Me</button>
          <button class="ai-chip" onclick="askAI('summarize')">Summarize</button>
        </div>
        <div class="ai-ask-row">
          <input type="text" id="aiQuestion" placeholder="Ask a question about this lesson...">
          <button onclick="askAI('custom')">Ask</button>
        </div>
        <div class="ai-output" id="aiOutput" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<!-- Certificate -->
<div class="overlay" id="certOverlay">
  <div class="sheet">
    <button class="close-x" onclick="closeModal('certOverlay')">&times;</button>
    <div class="cert-sheet-body">
      <div class="cert-doc">
        <div class="eyebrow">Paradise of Eternal Learners</div>
        <h2 class="display">Certificate of Completion</h2>
        <div class="name" id="certName"></div>
        <div class="course">has successfully completed</div>
        <div class="course" id="certCourse" style="font-weight:700; font-style:normal;"></div>
        <div class="date" id="certDate"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ====================================================================
   CONFIG — REQUIRED — same project as skillstream-courses.html
   ==================================================================== */
const SUPABASE_URL = 'https://vauudtedojtcveiqajlr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_mKrbrP7s7BLQgb6u0IQ8xg_wn--izVE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let allCourses = [];
let activeCategory = 'All';
let activeLevel = 'All';
let searchTerm = '';
let savedCourseIds = new Set();
let activeCourse = null;
let activeLessons = [];
let completedLessonIds = new Set();
let activeLesson = null;
let activeReviews = [];
let myReview = null;
let pendingRating = 0;

const LEVEL_LABELS = {
  'kg': 'Kindergarten',
  'elementary': 'Elementary',
  'middle_school': 'Middle School',
  'high_school': 'High School',
  'university': 'University'
};

// If arriving from the Academic page (e.g. skillstream-academic.html?level=high_school),
// pre-select that level filter.
const urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('level') && LEVEL_LABELS[urlParams.get('level')]){
  activeLevel = urlParams.get('level');
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(()=> t.style.display='none', 2200);
}
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

/* ---------- AUTH ----------
   Direct Supabase auth check (see note in skillstream-courses.html —
   swap for your shared auth module's session call if you'd rather
   keep everything routed through skillstream-auth.js). */
async function initAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){
    window.location.href = 'skillstream-login.html';
    return;
  }
  currentUser = session.user;
  loadCourses();

  sb.auth.onAuthStateChange((event, session)=>{
    if(!session){ window.location.href = 'skillstream-login.html'; }
  });
}

/* ---------- BROWSE ---------- */
async function loadCourses(){
  const [{ data, error }, { data: saved }] = await Promise.all([
    sb.from('courses').select('*, lessons(count)').eq('is_published', true).order('created_at', { ascending:false }),
    sb.from('saved_courses').select('course_id').eq('user_id', currentUser.id)
  ]);

  if(error){
    document.getElementById('courseGrid').innerHTML = `<div class="empty">Couldn't load courses.<br><small>${error.message}</small></div>`;
    return;
  }
  allCourses = data || [];
  savedCourseIds = new Set((saved || []).map(s => s.course_id));
  renderFilters();
  renderGrid();
}

function renderFilters(){
  const cats = ['All', 'Saved', ...new Set(allCourses.map(c => c.category).filter(Boolean))];
  document.getElementById('filters').innerHTML = cats.map(cat => `
    <button class="chip ${cat === activeCategory ? 'active' : ''}" onclick="setCategory('${escapeHtml(cat).replace(/'/g,"\\'")}')">${cat === 'Saved' ? '★ Saved' : escapeHtml(cat)}</button>
  `).join('');

  const levelsPresent = [...new Set(allCourses.map(c => c.education_level).filter(Boolean))];
  if(levelsPresent.length === 0){
    document.getElementById('levelFilters').innerHTML = '';
    return;
  }
  const levels = ['All', ...levelsPresent];
  document.getElementById('levelFilters').innerHTML = levels.map(lvl => `
    <button class="chip ${lvl === activeLevel ? 'active' : ''}" onclick="setLevel('${lvl}')">${lvl === 'All' ? 'All Levels' : (LEVEL_LABELS[lvl] || escapeHtml(lvl))}</button>
  `).join('');
}

function setLevel(lvl){
  activeLevel = lvl;
  renderFilters();
  renderGrid();
}

function setCategory(cat){
  activeCategory = cat;
  renderFilters();
  renderGrid();
}

function onSearchInput(){
  searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
  renderGrid();
}

function renderGrid(){
  const el = document.getElementById('courseGrid');
  let list = allCourses;
  if(activeCategory === 'Saved') list = list.filter(c => savedCourseIds.has(c.id));
  else if(activeCategory !== 'All') list = list.filter(c => c.category === activeCategory);

  if(activeLevel !== 'All') list = list.filter(c => c.education_level === activeLevel);

  if(searchTerm){
    list = list.filter(c =>
      (c.title || '').toLowerCase().includes(searchTerm) ||
      (c.description || '').toLowerCase().includes(searchTerm) ||
      (c.category || '').toLowerCase().includes(searchTerm)
    );
  }

  if(list.length === 0){
    let msg = searchTerm ? `No courses match "${escapeHtml(searchTerm)}".` : 'Check back soon — new courses are added regularly.';
    if(activeCategory === 'Saved' && !searchTerm) msg = 'Tap the star on any course to save it for later.';
    el.innerHTML = `<div class="empty"><div class="display">No courses found</div>${msg}</div>`;
    return;
  }

  el.innerHTML = list.map(c => {
    const lessonCount = c.lessons?.[0]?.count ?? 0;
    const bg = c.thumbnail_url ? `background-image:url('${c.thumbnail_url}');` : '';
    const isSaved = savedCourseIds.has(c.id);
    const levelTag = c.education_level ? `<span class="cat" style="margin-left:6px;">${LEVEL_LABELS[c.education_level] || c.education_level}</span>` : '';
    return `
    <div class="course-card" onclick="openCourse('${c.id}')">
      <button class="save-btn ${isSaved ? 'saved' : ''}" onclick="event.stopPropagation(); toggleSave('${c.id}')">${isSaved ? '★' : '☆'}</button>
      <div class="thumb" style="${bg}"><span class="cat">${escapeHtml(c.category || 'General')}</span>${levelTag}</div>
      <div class="body">
        <h3>${escapeHtml(c.title)}</h3>
        <p>${escapeHtml(c.description || '')}</p>
        <div class="progress-label">${lessonCount} lesson${lessonCount===1?'':'s'}</div>
      </div>
    </div>`;
  }).join('');
}

async function toggleSave(courseId){
  const isSaved = savedCourseIds.has(courseId);
  if(isSaved){
    savedCourseIds.delete(courseId);
    await sb.from('saved_courses').delete().eq('user_id', currentUser.id).eq('course_id', courseId);
  } else {
    savedCourseIds.add(courseId);
    await sb.from('saved_courses').insert({ user_id: currentUser.id, course_id: courseId });
  }
  renderGrid();
}

function showBrowse(){
  document.getElementById('browseView').style.display = 'block';
  document.getElementById('detailView').style.display = 'none';
}

/* ---------- COURSE DETAIL ---------- */
async function openCourse(courseId){
  activeCourse = allCourses.find(c => c.id === courseId);
  if(!activeCourse) return;

  document.getElementById('browseView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('detailHeader').innerHTML = `
    <h2 class="display">${escapeHtml(activeCourse.title)}</h2>
    <p>${escapeHtml(activeCourse.description || '')}</p>
  `;
  document.getElementById('trail').innerHTML = '<div class="loading">Loading lessons…</div>';
  document.getElementById('certBanner').innerHTML = '';

  const [{ data: lessons, error: lErr }, { data: progress, error: pErr }] = await Promise.all([
    sb.from('lessons').select('*').eq('course_id', courseId).order('order_index', { ascending:true }),
    sb.from('lesson_progress').select('lesson_id, completed').eq('user_id', currentUser.id)
  ]);

  if(lErr){
    document.getElementById('trail').innerHTML = `<div class="empty">${lErr.message}</div>`;
    return;
  }

  activeLessons = lessons || [];
  completedLessonIds = new Set((progress || []).filter(p => p.completed).map(p => p.lesson_id));
  renderTrail();
  checkCertificateEligibility();
  loadReviews(courseId);
  loadDiscussion(courseId);
}

function renderTrail(){
  const el = document.getElementById('trail');
  if(activeLessons.length === 0){
    el.innerHTML = '<div class="empty">No lessons in this course yet.</div>';
    return;
  }
  let firstIncompleteFound = false;
  el.innerHTML = activeLessons.map((l, i) => {
    const done = completedLessonIds.has(l.id);
    const isCurrent = !done && !firstIncompleteFound;
    if(isCurrent) firstIncompleteFound = true;
    return `
    <div class="trail-item ${done ? 'done' : ''} ${isCurrent ? 'current' : ''}">
      <div class="trail-line"></div>
      <div class="trail-dot">${done ? '✓' : (i+1)}</div>
      <div class="trail-content" onclick="playLesson('${l.id}')">
        <h4>${escapeHtml(l.title)}</h4>
        <div class="meta">${l.duration_minutes ? l.duration_minutes + ' min' : 'Video lesson'}</div>
      </div>
    </div>`;
  }).join('');
}

/* ---------- PLAYER ---------- */
function youtubeEmbed(url){
  if(!url) return '';
  let id = '';
  const watchMatch = url.match(/[?&]v=([^&]+)/);
  const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
  if(watchMatch) id = watchMatch[1];
  else if(shortMatch) id = shortMatch[1];
  else return '';
  return `https://www.youtube.com/embed/${id}`;
}

function playLesson(lessonId){
  activeLesson = activeLessons.find(l => l.id === lessonId);
  if(!activeLesson) return;

  const embedUrl = youtubeEmbed(activeLesson.video_url);
  document.getElementById('videoWrap').innerHTML = embedUrl
    ? `<iframe src="${embedUrl}" allowfullscreen></iframe>`
    : `<div style="color:#fff; padding:30px; text-align:center;">No video attached to this lesson.</div>`;

  document.getElementById('playerTitle').textContent = activeLesson.title;
  document.getElementById('playerContent').textContent = activeLesson.content || '';
  document.getElementById('aiOutput').style.display = 'none';
  document.getElementById('aiOutput').textContent = '';
  document.getElementById('aiQuestion').value = '';
  updateCompleteBtn();
  openModal('playerOverlay');
}

function updateCompleteBtn(){
  const btn = document.getElementById('completeBtn');
  const done = completedLessonIds.has(activeLesson.id);
  btn.textContent = done ? '✓ Completed — tap to undo' : 'Mark as Complete';
  btn.className = 'btn' + (done ? ' done' : '');
}

async function toggleComplete(){
  const done = completedLessonIds.has(activeLesson.id);
  const newState = !done;

  const { error } = await sb.from('lesson_progress').upsert({
    user_id: currentUser.id,
    lesson_id: activeLesson.id,
    completed: newState,
    completed_at: newState ? new Date().toISOString() : null
  }, { onConflict: 'user_id,lesson_id' });

  if(error){ toast('Error: ' + error.message); return; }

  if(newState) completedLessonIds.add(activeLesson.id);
  else completedLessonIds.delete(activeLesson.id);

  // Keep a public lessons_completed_count on the profile in sync, used by
  // the Leaderboard (which can't read other users' private lesson_progress
  // rows directly due to row-level security).
  await sb.rpc('adjust_lessons_completed_count', { delta: newState ? 1 : -1 }).catch(() => {});

  updateCompleteBtn();
  renderTrail();
  checkCertificateEligibility();
  toast(newState ? 'Lesson complete!' : 'Marked incomplete');
}

/* ---------- CERTIFICATE ---------- */
function checkCertificateEligibility(){
  const banner = document.getElementById('certBanner');
  if(activeLessons.length === 0){ banner.innerHTML = ''; return; }
  const allDone = activeLessons.every(l => completedLessonIds.has(l.id));
  if(allDone){
    banner.innerHTML = `
      <div class="cert-banner">
        <div class="display">Course Complete!</div>
        <div>You've finished every lesson in ${escapeHtml(activeCourse.title)}.</div>
        <button onclick="issueCertificate()">Get Your Certificate</button>
      </div>`;
  } else {
    banner.innerHTML = '';
  }
}

async function issueCertificate(){
  const { data: existing } = await sb
    .from('certificates')
    .select('*')
    .eq('user_id', currentUser.id)
    .eq('course_id', activeCourse.id)
    .maybeSingle();

  let cert = existing;
  if(!cert){
    const { data, error } = await sb.from('certificates').insert({
      user_id: currentUser.id,
      course_id: activeCourse.id,
      issued_at: new Date().toISOString()
    }).select().single();
    if(error){ toast('Error: ' + error.message); return; }
    cert = data;

    await sb.from('notifications').insert({
      user_id: currentUser.id,
      title: 'Certificate earned!',
      body: `You completed "${activeCourse.title}" — nice work.`,
      is_read: false
    });

    await sb.rpc('adjust_certificates_count', { delta: 1 }).catch(() => {});
  }

  const { data: profile } = await sb.from('profiles').select('full_name').eq('id', currentUser.id).maybeSingle();
  const name = profile?.full_name || currentUser.email;

  document.getElementById('certName').textContent = name;
  document.getElementById('certCourse').textContent = activeCourse.title;
  document.getElementById('certDate').textContent = 'Issued ' + new Date(cert.issued_at).toLocaleDateString();
  openModal('certOverlay');
}

/* ---------- AI TUTOR ----------
   Calls our own /api/ask-ai serverless function (Vercel) instead of
   Anthropic directly, so the API key stays server-side and is never
   exposed in the browser. */
async function askAI(mode){
  const output = document.getElementById('aiOutput');
  const question = document.getElementById('aiQuestion').value.trim();

  let prompt;
  if(mode === 'explain'){
    prompt = `Explain the lesson "${activeLesson.title}" from the course "${activeCourse.title}" in simple, encouraging terms for a self-paced learner. Lesson notes: ${activeLesson.content || '(no notes provided, use the title and course context)'}. Keep it under 150 words.`;
  } else if(mode === 'quiz'){
    prompt = `Create a short 3-question quiz (with answers shown after each question) testing understanding of the lesson "${activeLesson.title}" from the course "${activeCourse.title}". Lesson notes: ${activeLesson.content || '(no notes provided, use the title and course context)'}.`;
  } else if(mode === 'summarize'){
    prompt = `Summarize the key takeaways of the lesson "${activeLesson.title}" from the course "${activeCourse.title}" in 3-5 bullet points. Lesson notes: ${activeLesson.content || '(no notes provided, use the title and course context)'}.`;
  } else {
    if(!question){ toast('Type a question first'); return; }
    prompt = `In the context of the lesson "${activeLesson.title}" (course: "${activeCourse.title}"), answer this student question clearly and concisely: ${question}`;
  }

  output.style.display = 'block';
  output.className = 'ai-output loading-text';
  output.textContent = 'Thinking…';

  try{
    const response = await fetch('/api/ask-ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, maxTokens: 500 })
    });

    const data = await response.json();
    if(data.error){ throw new Error(data.error); }

    output.className = 'ai-output';
    output.textContent = data.text || 'No response received — try again.';
  } catch(err){
    output.className = 'ai-output';
    output.textContent = 'AI Tutor error: ' + err.message;
  }
}

initAuth();

/* ---------- COURSE DISCUSSION ROOM ---------- */
async function loadDiscussion(courseId){
  const el = document.getElementById('discussionSection');
  el.innerHTML = '<div class="loading">Loading discussion…</div>';

  const { data, error } = await sb
    .from('course_comments')
    .select('*, profiles(full_name)')
    .eq('course_id', courseId)
    .order('created_at', { ascending:false });

  if(error){
    el.innerHTML = `<div class="empty">Couldn't load discussion.</div>`;
    return;
  }

  const comments = data || [];
  let html = `
    <div class="reviews-header"><div class="avg"><span style="font-size:12.5px; color:var(--gold); font-weight:700; text-transform:uppercase; letter-spacing:1.2px;">Discussion</span></div></div>
    <div class="comment-form">
      <textarea id="commentInput" placeholder="Ask a question or share a thought about this course..."></textarea>
      <button onclick="postComment('${courseId}')">Post</button>
    </div>
  `;

  if(comments.length === 0){
    html += `<div class="empty">No discussion yet — be the first to ask a question or share a thought.</div>`;
  } else {
    html += comments.map(c => `
      <div class="comment-card">
        <div class="c-top">
          <span class="c-name">${escapeHtml(c.profiles?.full_name || 'Learner')}</span>
          <span class="c-time">${new Date(c.created_at).toLocaleDateString()}</span>
        </div>
        <div class="c-body">${escapeHtml(c.message)}</div>
      </div>
    `).join('');
  }

  el.innerHTML = html;
}

async function postComment(courseId){
  const input = document.getElementById('commentInput');
  const message = input.value.trim();
  if(!message){ toast('Write something first'); return; }

  const { error } = await sb.from('course_comments').insert({
    course_id: courseId,
    user_id: currentUser.id,
    message
  });

  if(error){ toast('Error: ' + error.message); return; }
  loadDiscussion(courseId);
}

/* ---------- REVIEWS ---------- */
async function loadReviews(courseId){
  const el = document.getElementById('reviewsSection');
  el.innerHTML = '<div class="loading">Loading reviews…</div>';

  const { data, error } = await sb
    .from('course_reviews')
    .select('*, profiles(full_name)')
    .eq('course_id', courseId)
    .order('created_at', { ascending:false });

  if(error){
    el.innerHTML = `<div class="empty">Couldn't load reviews.</div>`;
    return;
  }

  activeReviews = data || [];
  myReview = activeReviews.find(r => r.user_id === currentUser.id) || null;
  pendingRating = myReview?.rating || 0;
  renderReviews();
}

function starString(n){
  return '★'.repeat(n) + '☆'.repeat(5 - n);
}

function renderReviews(){
  const el = document.getElementById('reviewsSection');
  const others = activeReviews.filter(r => r.user_id !== currentUser.id);
  const avg = activeReviews.length
    ? (activeReviews.reduce((s,r)=>s+r.rating,0) / activeReviews.length)
    : 0;

  let html = `
    <div class="reviews-header">
      <div class="avg">
        <span class="stars">${starString(Math.round(avg))}</span>
        <span class="count">${avg ? avg.toFixed(1) : '—'} (${activeReviews.length} review${activeReviews.length===1?'':'s'})</span>
      </div>
    </div>

    <div class="my-review-form">
      <label>${myReview ? 'Your Review' : 'Leave a Review'}</label>
      <div class="star-picker" id="starPicker">
        ${[1,2,3,4,5].map(n => `<button class="${n <= pendingRating ? 'active' : ''}" onclick="setPendingRating(${n})">★</button>`).join('')}
      </div>
      <textarea id="reviewComment" placeholder="What did you think of this course?">${myReview?.comment ? escapeHtml(myReview.comment) : ''}</textarea>
      <button class="submit-btn" onclick="submitReview()">${myReview ? 'Update Review' : 'Submit Review'}</button>
    </div>
  `;

  if(others.length === 0){
    html += `<div class="empty">No reviews from other learners yet.</div>`;
  } else {
    html += others.map(r => `
      <div class="review-card">
        <div class="r-top">
          <span class="r-name">${escapeHtml(r.profiles?.full_name || 'Learner')}</span>
          <span class="r-stars">${starString(r.rating)}</span>
        </div>
        ${r.comment ? `<div class="r-comment">${escapeHtml(r.comment)}</div>` : ''}
        <div class="r-date">${new Date(r.created_at).toLocaleDateString()}</div>
      </div>
    `).join('');
  }

  el.innerHTML = html;
}

function setPendingRating(n){
  const existingText = document.getElementById('reviewComment')?.value ?? '';
  pendingRating = n;
  renderReviews();
  const ta = document.getElementById('reviewComment');
  if(ta) ta.value = existingText;
}

async function submitReview(){
  if(pendingRating === 0){ toast('Please select a star rating'); return; }
  const comment = document.getElementById('reviewComment').value.trim();

  const { error } = await sb.from('course_reviews').upsert({
    course_id: activeCourse.id,
    user_id: currentUser.id,
    rating: pendingRating,
    comment
  }, { onConflict: 'course_id,user_id' });

  if(error){ toast('Error: ' + error.message); return; }
  toast(myReview ? 'Review updated' : 'Review submitted');
  loadReviews(activeCourse.id);
}
</script>
